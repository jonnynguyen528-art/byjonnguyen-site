<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <style>

    @font-face {
      font-family: 'Cinema Sunday';
      src: url('assets/fonts/cinema-sunday.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body { font-family: 'Montserrat', sans-serif; }

    .brand {
      font-family: 'Cinema Sunday', serif;
      font-weight: normal;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 2.2rem;
      line-height: 1;
    }

    .nav a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    .hero-composition {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      overflow: visible;
    }

    .hero-word-col {
      flex: 1;
      display: flex;
      align-items: flex-end;
      padding-top: calc(min(560px, 82vw) * 0.46);
      position: relative;
      z-index: 1;
    }

    .hero-word-col.left  { justify-content: flex-end;  margin-right: -200px; }
    .hero-word-col.right { justify-content: flex-start; margin-left:  -200px; }

    .hero-word {
      font-family: 'Cinema Sunday', serif;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1;
      font-size: clamp(32px, 3.8vw, 62px);
      color: rgba(18,18,18,0.88);
      white-space: nowrap;
    }

    .hero-line1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(18,18,18,0.70);
    }

    .hero-line2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      font-size: 9.5px;
      color: rgba(18,18,18,0.48);
      margin-top: 6px;
    }

    .hero-bust-img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      pointer-events: none;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    .hero-sculpture { animation: floaty 6s ease-in-out infinite; }

    #cursorSpotlight {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #groundShadow {
      position: absolute;
      bottom: 3%;
      left: 50%;
      width: 52%;
      height: 28px;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0.32) 0%,
        rgba(0,0,0,0.12) 45%,
        transparent 70%);
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity, filter;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-composition reveal reveal-delay-1">
        <div class="hero-word-col left">
          <span class="hero-word">CREATIVE</span>
        </div>

        <div class="hero-bust">
          <div class="hero-sculpture" id="heroStage" style="position:relative;">
            <img class="hero-bust-img"
                 src="frames/hero-bust-b2.png"
                 alt="Porcelain bust sculpture"
                 draggable="false" />
            <div id="groundShadow"></div>
          </div>
        </div>

        <div class="hero-word-col right">
          <span class="hero-word">DIRECTOR</span>
        </div>
      </div>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND &nbsp;·&nbsp; DIGITAL &nbsp;·&nbsp; EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work"    style="height:50vh;"></section>
  <section id="about"   style="height:50vh;"></section>
  <section id="contact" style="height:50vh;"></section>
</main>

<div id="cursorSpotlight"></div>

<script>
window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  });
});
</script>

<script>
(function () {
  const spotlight = document.getElementById('cursorSpotlight');
  const shadowEl  = document.getElementById('groundShadow');
  let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
  let curX = mouseX, curY = mouseY;
  let hasEntered = false;
  const LERP = 0.08;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY; hasEntered = true;
  });

  function tick() {
    curX += (mouseX - curX) * LERP;
    curY += (mouseY - curY) * LERP;

    if (!hasEntered) { requestAnimationFrame(tick); return; }

    const W = window.innerWidth, H = window.innerHeight;
    const dx = (curX - W * 0.5) / (W * 0.5);
    const dy = (curY - H * 0.5) / (H * 0.5);
    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 1.0);
    const blend = dist * 0.8;

    if (blend < 0.02) {
      spotlight.style.opacity = '0';
    } else {
      spotlight.style.opacity = blend.toFixed(3);
      spotlight.style.background = `
        radial-gradient(320px circle at ${curX}px ${curY}px,
          rgba(255,242,210,0.10) 0%, rgba(255,238,195,0.04) 50%, transparent 100%),
        radial-gradient(800px circle at ${curX}px ${curY}px,
          transparent 0%, transparent 25%,
          rgba(12,10,6,0.05) 60%, rgba(12,10,6,0.13) 100%)`;
    }

    if (shadowEl) {
      const cx    = mouseX / W - 0.5;
      const adist = Math.abs(cx);
      shadowEl.style.transform = `translateX(calc(-50% + ${(-cx*120).toFixed(1)}px)) scaleX(${(0.8+adist*2).toFixed(3)})`;
      shadowEl.style.filter    = `blur(${(8+adist*20).toFixed(1)}px)`;
      shadowEl.style.opacity   = Math.min(0.08+adist*0.25, 0.4).toFixed(3);
    }

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

</body>
</html>
