<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <link rel="stylesheet" href="style.css" />

  <script async src="https://unpkg.com/es-module-shims@1.8.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav__logo">Jon Nguyen</a>
    <ul class="nav__links">
      <li><a href="#work">Work</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">

    <div class="hero__title" aria-label="Creative Director">
      <span class="hero__title-left">Creative</span>
      <span class="hero__title-right">Director</span>
    </div>

    <div class="hero__canvas-wrap" id="canvasWrap">
      <canvas id="heroCanvas"></canvas>
    </div>

    <div class="hero__sub">
      <p class="hero__sub-main">Building Worlds</p>
      <p class="hero__sub-tagline">Brand &nbsp;·&nbsp; Digital &nbsp;·&nbsp; Experiential</p>
    </div>

  </section>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';

    const wrap   = document.getElementById('canvasWrap');
    const canvas = document.getElementById('heroCanvas');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    function resize() {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
    camera.position.set(0, 0.05, 2.6);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping   = true;
    controls.dampingFactor   = 0.06;
    controls.enableZoom      = false;
    controls.enablePan       = false;
    controls.autoRotate      = true;
    controls.autoRotateSpeed = 0.55;
    controls.minPolarAngle   = Math.PI / 2.4;
    controls.maxPolarAngle   = Math.PI / 1.8;

    const ambient = new THREE.AmbientLight(0xffffff, 1.4);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xfff5e8, 3.5);
    key.position.set(1.5, 3, 2.5);
    key.castShadow = true;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xddeeff, 1.2);
    fill.position.set(-2, 1, 1);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffffff, 1.0);
    rim.position.set(0, 2, -3);
    scene.add(rim);

    const hemi = new THREE.HemisphereLight(0xfff8f0, 0xe8f0ff, 0.8);
    scene.add(hemi);

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');

    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    let model;

    loader.load(
      'assets/porcelain_girl_2_opt.glb',
      (gltf) => {
        model = gltf.scene;

        const box    = new THREE.Box3().setFromObject(model);
        const centre = new THREE.Vector3();
        box.getCenter(centre);
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 1.6 / maxDim;

        model.scale.setScalar(scale);
        model.position.sub(centre.multiplyScalar(scale));
        model.position.y -= 0.08;

        scene.add(model);
        document.getElementById('canvasWrap').classList.add('loaded');
      },
      undefined,
      (err) => console.error('GLB load error:', err)
    );

    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    resize();
    window.addEventListener('resize', resize);

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      if (model) {
        model.position.y += Math.sin(t * 0.8) * 0.0003;
        model.rotation.x += (mouseY * 0.04 - model.rotation.x) * 0.04;
        model.rotation.y += (mouseX * 0.06 - model.rotation.y) * 0.04;
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>

</body>
</html>
