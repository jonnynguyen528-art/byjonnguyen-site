<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="#">JON NGUYEN</a>
      <nav class="nav">
        <a href="#work">WORK</a>
        <a href="#about">ABOUT</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-center">
      <div class="hero-inner">

        <div class="hero-title reveal reveal-delay-1">
          <span class="hero-word left">CREATIVE</span>
          <span class="hero-word right">DIRECTOR</span>
        </div>

        <div class="hero-bust reveal reveal-delay-2">
          <model-viewer
  id="heroModel"
  src="/assets/porcelain_girl_2_opt.glb"
  alt="Porcelain sculpture"
  interaction-prompt="none"
  disable-pan
  disable-zoom
  environment-image="neutral"
  exposure="1.05"
  camera-target="0m 0m 0m"
  camera-orbit="0deg 75deg auto"
  style="width:100%; height:100%; background:transparent;"
></model-viewer>
        </div>

        <div class="hero-sub reveal reveal-delay-3">
          <div class="hero-line1">BUILDING WORLDS</div>
          <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
        </div>

      </div>
    </section>
  </main>

  <!-- Reveal -->
  <script>
    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
      });
    });
  </script>

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>

  <!-- Cursor tracking -->
 <script>
(async () => {
  await customElements.whenDefined('model-viewer');

  const mv = document.getElementById('heroModel');
  if (!mv) return;

  // --- TUNING ---
  const BASE_YAW   = -8;   // resting left/right
  const BASE_PITCH = 68;   // resting up/down
  const RADIUS_M   = 0.32; // SMALLER = CLOSER (try 0.28 if still small)

  const MAX_YAW = 4;
  const MAX_PITCH = 3;
  const EASE = 0.08;

  let yaw = BASE_YAW, pitch = BASE_PITCH;
  let targetYaw = BASE_YAW, targetPitch = BASE_PITCH;

  function applyOrbit() {
    mv.cameraOrbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${RADIUS_M.toFixed(3)}m`;
  }

  function setTarget(e) {
    const nx = (e.clientX / window.innerWidth - 0.5) * 2; // -1..1
    const ny = (e.clientY / window.innerHeight - 0.5) * 2; // -1..1

    targetYaw = BASE_YAW + (-nx * MAX_YAW);
    targetPitch = BASE_PITCH + (-ny * MAX_PITCH);
  }

  function tick() {
    yaw += (targetYaw - yaw) * EASE;
    pitch += (targetPitch - pitch) * EASE;

    applyOrbit();
    requestAnimationFrame(tick);
  }

  function reset() {
    targetYaw = BASE_YAW;
    targetPitch = BASE_PITCH;
  }

  function start() {
    // PROOF it's running:
    console.log('cursor script running — forcing orbit radius:', RADIUS_M);

    // Force camera immediately on load
    yaw = BASE_YAW; pitch = BASE_PITCH;
    targetYaw = BASE_YAW; targetPitch = BASE_PITCH;
    applyOrbit();

    requestAnimationFrame(tick);
  }

  if (mv.loaded) start();
  else mv.addEventListener('load', start, { once: true });

  window.addEventListener('pointermove', setTarget, { passive: true });

  window.addEventListener('mouseout', (e) => {
    if (!e.relatedTarget) reset();
  });

  window.addEventListener('blur', reset);

})();
</script>

</body>
</html>
