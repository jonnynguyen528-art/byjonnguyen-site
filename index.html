/* ─── HERO COMPOSITION LAYOUT ───────────────────────────────────── */

.hero-composition {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  overflow: visible;
}

/* Desktop: words flank the bust with negative overlap */
.hero-word-col {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding-top: calc(clamp(320px, 58vw, 680px) * 0.27);
  position: relative;
  z-index: 1;
}

.hero-word-col.left  { justify-content: flex-end;  margin-right: clamp(-150px, -21vw, -260px); }
.hero-word-col.right { justify-content: flex-start; margin-left:  clamp(-150px, -21vw, -260px); }

.hero-word {
  font-family: 'Cinema Sunday', serif;
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1;
  font-size: clamp(32px, 5vw, 82px);
  color: rgba(18,18,18,0.88);
  white-space: nowrap;
}

/* ── Tablet ── */
@media (max-width: 900px) {
  .hero-word-col {
    padding-top: calc(clamp(240px, 48vw, 480px) * 0.22);
  }
  .hero-word-col.left  { margin-right: clamp(-60px, -12vw, -140px); }
  .hero-word-col.right { margin-left:  clamp(-60px, -12vw, -140px); }
  .hero-word {
    font-size: clamp(22px, 4.2vw, 52px);
  }
}

/* ── Mobile: keep flanking layout, scale everything down ── */
@media (max-width: 600px) {
  .hero-composition { flex-direction: row; align-items: flex-start; overflow: visible; }
  .hero-word-col { flex: 1; padding-top: calc(62vw * 0.27) !important; }
  .hero-word-col.left  { justify-content: flex-end;  margin-right: clamp(-40px, -11vw, -60px) !important; }
  .hero-word-col.right { justify-content: flex-start; margin-left:  clamp(-40px, -11vw, -60px) !important; }
  .hero-word { font-size: clamp(16px, 6.5vw, 28px); text-align: unset; white-space: nowrap; }
}

.hero-line1 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  font-size: 11px;
  color: rgba(18,18,18,0.70);
}

.hero-line2 {

  font-weight: 300;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  font-size: 9.5px;
  color: rgba(18,18,18,0.48);
  margin-top: 6px;
}

.hero-bust-img {
  display: block;
  width: 100%;
  height: auto;
  user-select: none;
  pointer-events: none;
}

@keyframes floaty {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-14px); }
}

.hero-sculpture { animation: floaty 6s ease-in-out infinite; }

#cursorSpotlight {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.8s ease;
}

#groundShadow {
  position: absolute;
  bottom: 3%;
  left: 50%;
  width: 52%;
  height: 28px;
  background: radial-gradient(ellipse at center,
    rgba(0,0,0,0.32) 0%,
    rgba(0,0,0,0.12) 45%,
    transparent 70%);
  transform: translateX(-50%);
  opacity: 0;
  pointer-events: none;
  will-change: transform, opacity, filter;
}

/* ─── LUXURY REVEAL SYSTEM ──────────────────────────────────────── */

/*
  Three actors, three keyframes, one orchestrated sequence.
  Easing: cubic-bezier(0.16, 1, 0.3, 1) — an expo-out curve.
  Slow start, decisive arrival. Very haute couture.
*/

/* CREATIVE — drifts in from the left */
@keyframes revealLeft {
  0% {
    opacity: 0;
    transform: translateX(-48px);
    filter: blur(6px);
  }
  60% {
    filter: blur(0px);
  }
  100% {
    opacity: 1;
    transform: translateX(0);
    filter: blur(0px);
  }
}

/* DIRECTOR — drifts in from the right */
@keyframes revealRight {
  0% {
    opacity: 0;
    transform: translateX(48px);
    filter: blur(6px);
  }
  60% {
    filter: blur(0px);
  }
  100% {
    opacity: 1;
    transform: translateX(0);
    filter: blur(0px);
  }
}

/* PNG bust — descends from slightly above, like being unveiled */
@keyframes revealBust {
  0% {
    opacity: 0;
    transform: translateY(-28px) scale(0.97);
    filter: blur(4px);
  }
  55% {
    filter: blur(0px);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0px);
  }
}

/* Subtitle lines — rise up softly after everything else lands */
@keyframes revealUp {
  0% {
    opacity: 0;
    transform: translateY(16px);
    letter-spacing: 0.28em;
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Default hidden state for all reveal actors */
.rx { opacity: 0; }

/* CREATIVE fires first */
.rx-creative {
  animation: revealLeft 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
}

/* DIRECTOR follows — beat after CREATIVE */
.rx-director {
  animation: revealRight 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
}

/* Bust drops in last — the reveal moment */
.rx-bust {
  animation: revealBust 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
}

/* Subtitle breathes in after everything has landed */
.rx-sub {
  animation: revealUp 1.1s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
}

/* ─────────────────────────────────────────────────────────────── */

/* ─── MOBILE REVEAL OVERRIDE ────────────────────────────────────
   Side-by-side on mobile, so use left/right slides like desktop.
─────────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  @keyframes revealWordMobileL {
    0%   { opacity: 0; transform: translateX(-20px); filter: blur(4px); }
    100% { opacity: 1; transform: translateX(0);     filter: blur(0);   }
  }
  @keyframes revealWordMobileR {
    0%   { opacity: 0; transform: translateX(20px);  filter: blur(4px); }
    100% { opacity: 1; transform: translateX(0);     filter: blur(0);   }
  }
  .rx-creative {
    animation: revealWordMobileL 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }
  .rx-director {
    animation: revealWordMobileR 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards;
  }
  .rx-bust {
    animation: revealBust 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.85s forwards;
  }
  .rx-sub {
    animation: revealUp 1.0s cubic-bezier(0.16, 1, 0.3, 1) 1.45s forwards;
  }
}

<div id="cursorSpotlight"></div>

<script>
(function () {
  const spotlight = document.getElementById('cursorSpotlight');
  const shadowEl  = document.getElementById('groundShadow');
  let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
  let curX = mouseX, curY = mouseY;
  let hasEntered = false;
  const LERP = 0.08;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY; hasEntered = true;
  });

  function tick() {
    curX += (mouseX - curX) * LERP;
    curY += (mouseY - curY) * LERP;

    if (!hasEntered) { requestAnimationFrame(tick); return; }

    const W = window.innerWidth, H = window.innerHeight;
    const dx = (curX - W * 0.5) / (W * 0.5);
    const dy = (curY - H * 0.5) / (H * 0.5);
    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 1.0);
    const blend = dist * 0.8;

    if (blend < 0.02) {
      spotlight.style.opacity = '0';
    } else {
      spotlight.style.opacity = blend.toFixed(3);
      spotlight.style.background = `
        radial-gradient(320px circle at ${curX}px ${curY}px,
          rgba(255,242,210,0.10) 0%, rgba(255,238,195,0.04) 50%, transparent 100%),
        radial-gradient(800px circle at ${curX}px ${curY}px,
          transparent 0%, transparent 25%,
          rgba(12,10,6,0.05) 60%, rgba(12,10,6,0.13) 100%)`;
    }

    if (shadowEl) {
      const cx    = mouseX / W - 0.5;
      const adist = Math.abs(cx);
      shadowEl.style.transform = `translateX(calc(-50% + ${(-cx*120).toFixed(1)}px)) scaleX(${(0.8+adist*2).toFixed(3)})`;
      shadowEl.style.filter    = `blur(${(8+adist*20).toFixed(1)}px)`;
      shadowEl.style.opacity   = Math.min(0.08+adist*0.25, 0.4).toFixed(3);
    }

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
