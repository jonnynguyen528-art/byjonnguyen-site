<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="#">JON NGUYEN</a>

      <nav class="nav">
        <a href="#work">WORK</a>
        <a href="#about">ABOUT</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-center">
      <div class="hero-inner">

        <div class="hero-title reveal reveal-delay-1">
  <span class="hero-word left">CREATIVE</span>
  <span class="hero-word right">DIRECTOR</span>
</div>

<div class="hero-bust reveal reveal-delay-2">
  <span class="bust-sweep">
    <img src="/assets/hero-bust.png" alt="Porcelain sculpture with blue dragon painting" />
  </span>
</div>

<div class="hero-sub reveal reveal-delay-3">
  <div class="hero-line1">BUILDING WORLDS</div>
  <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
</div>

      </div>
    </section>

    <section id="work" style="height: 50vh;"></section>
    <section id="about" style="height: 50vh;"></section>
    <section id="contact" style="height: 50vh;"></section>
  </main>

<script>
  window.addEventListener('load', () => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
    });
  });
</script>

<script>
  const bust = document.querySelector('.hero-bust img');
  window.addEventListener('scroll', () => {
    const offset = window.scrollY * 0.08;
    bust.style.transform = `translateY(${offset}px)`;
  });
</script>
  
</body>
</html>
