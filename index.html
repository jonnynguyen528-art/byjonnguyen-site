<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-title reveal reveal-delay-1">
        <span class="hero-word left">CREATIVE</span>
        <span class="hero-word right">DIRECTOR</span>
      </div>

      <div class="hero-bust reveal reveal-delay-2">
        <model-viewer
          id="heroModel"
          src="/assets/porcelain_girl_2.glb"
          alt="Porcelain sculpture"
          interaction-prompt="none"
          camera-controls
          disable-pan
          disable-zoom
          environment-image="neutral"
          exposure="1.05"
          camera-orbit="0deg 75deg auto"
          min-camera-orbit="0deg 75deg auto"
          max-camera-orbit="0deg 75deg auto"
          camera-target="0m 0m 0m"
          style="width:100%; height:100%; background:transparent;"
        ></model-viewer>
      </div>

      <div id="mvStatus" style="position:absolute; left:0; right:0; bottom:-26px; text-align:center; font:12px system-ui; color:rgba(18,18,18,.55);">
  checking…
</div>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work" style="height: 50vh;"></section>
  <section id="about" style="height: 50vh;"></section>
  <section id="contact" style="height: 50vh;"></section>
</main>

<!-- Reveal -->
<script>
  window.addEventListener('load', () => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
    });
  });
</script>

<!-- model-viewer library -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>

<!-- ADD THIS SCRIPT RIGHT HERE -->
<script>
(() => {
  const status = document.getElementById('mvStatus');
  const mv = document.getElementById('heroModel');
  if (!status) return;

  const libLoaded = !!customElements.get('model-viewer');
  status.textContent = libLoaded
    ? 'model-viewer loaded ✅ (waiting for GLB…)'
    : 'model-viewer NOT loaded ❌';

  if (mv) {
    mv.addEventListener('load', () => status.textContent = 'GLB loaded ✅');
    mv.addEventListener('error', () => status.textContent = 'GLB failed ❌');
  }
})();
</script>

<!-- Cursor tracking script stays BELOW this -->
<script>
(() => {
  const model = document.getElementById('heroModel');
  if (!model) return;

  // Subtle luxury range
  const MAX_YAW = 6;
  const MAX_PITCH = 4;
  const BASE_PITCH = 75;

  // If you're using auto-framing, keep radius as "auto" initially,
  // then we lock it after load by reading cameraOrbit string.
  let RADIUS = 'auto';

  const ease = 0.08;

  let targetYaw = 0, targetPitch = BASE_PITCH;
  let yaw = 0, pitch = BASE_PITCH;

  function setTargetFromWindow(e) {
    const x = e.clientX / window.innerWidth;
    const y = e.clientY / window.innerHeight;

    const nx = (x - 0.5) * 2;
    const ny = (y - 0.5) * 2;

    // correct direction
    targetYaw = -nx * MAX_YAW;
    targetPitch = BASE_PITCH + (-ny * MAX_PITCH);
  }

  function animate() {
    yaw += (targetYaw - yaw) * ease;
    pitch += (targetPitch - pitch) * ease;

    model.cameraOrbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${RADIUS}`;
    requestAnimationFrame(animate);
  }

  model.addEventListener('load', () => {
    // Lock radius from whatever model-viewer computed (if present)
    // cameraOrbit string format: "Xdeg Ydeg Zm"
    const parts = (model.cameraOrbit || '').trim().split(/\s+/);
    const last = parts[2];
    if (last && /m$/.test(last)) RADIUS = last; // e.g. "1.732m"

    // start centered
    yaw = 0;
    pitch = BASE_PITCH;
    targetYaw = 0;
    targetPitch = BASE_PITCH;

    requestAnimationFrame(animate);
  });

  window.addEventListener('pointermove', setTargetFromWindow, { passive: true });

  document.addEventListener('mouseleave', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });

  window.addEventListener('blur', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });
})();
</script>

</body>
</html>
