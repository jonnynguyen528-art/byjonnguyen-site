<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; background: #f4f1ea; }

    model-viewer {
      display: block;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      font: 12px monospace;
      padding: 10px;
      z-index: 999;
      white-space: pre;
    }
  </style>
</head>
<body>

  <div id="info">Loading...</div>

  <model-viewer
    id="mv"
    src="/assets/porcelain_girl_2.glb"
    alt="Porcelain sculpture"
    interaction-prompt="none"
    environment-image="neutral"
    exposure="1.1"
    camera-target="0m 0.13m 0m"
    camera-orbit="0deg 80deg auto"
    style="background:transparent;"
  ></model-viewer>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <script>
    const mv = document.getElementById('mv');
    const info = document.getElementById('info');

    mv.addEventListener('load', () => {
      setTimeout(() => {
        const orbit = mv.getCameraOrbit();
        const target = mv.getCameraTarget();
        const rect = mv.getBoundingClientRect();
        info.textContent = [
          `LOADED ✓`,
          `Element size: ${rect.width.toFixed(0)} x ${rect.height.toFixed(0)}px`,
          `Camera orbit: ${JSON.stringify(orbit)}`,
          `Camera target: ${JSON.stringify(target)}`,
          `Radius: ${orbit ? orbit.radius.toFixed(4) + 'm' : 'n/a'}`,
        ].join('\n');
      }, 500);
    });

    mv.addEventListener('error', (e) => {
      info.textContent = 'ERROR: ' + JSON.stringify(e.detail);
    });
  </script>

</body>
</html>
