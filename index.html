<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-title reveal reveal-delay-1">
        <span class="hero-word left">CREATIVE</span>
        <span class="hero-word right">DIRECTOR</span>
      </div>

<div class="hero-bust">
  <model-viewer
    id="heroModel"
    src="/assets/porcelain_girl_2.glb"
    alt="Porcelain sculpture"
    loading="eager"
    reveal="auto"
    environment-image="neutral"
    exposure="0.6"
    interaction-prompt="none"
    camera-orbit="0deg 75deg 2.4m"
    style="width:100%;height:100%;background:transparent;">
  </model-viewer>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work" style="height: 50vh;"></section>
  <section id="about" style="height: 50vh;"></section>
  <section id="contact" style="height: 50vh;"></section>
</main>

<!-- model viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- reveal animation -->
<script>
window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  });
});
</script>

<!-- cursor tracking luxury rotation -->
<script>
(() => {
  const model = document.getElementById('heroModel');
  if (!model) return;

  // Subtle luxury range
  const MAX_YAW = 6;        // left/right
  const MAX_PITCH = 4;      // up/down
  const BASE_PITCH = 75;    // match your camera-orbit pitch
  const RADIUS = '2.4m';    // match your camera-orbit radius

  // Smooth easing
  const ease = 0.08;

  let targetYaw = 0, targetPitch = BASE_PITCH;
  let yaw = 0, pitch = BASE_PITCH;

  function setTargetFromWindow(e) {
    // Normalize cursor position across the whole viewport
    const x = e.clientX / window.innerWidth;   // 0..1
    const y = e.clientY / window.innerHeight;  // 0..1

    const nx = (x - 0.5) * 2; // -1..1
    const ny = (y - 0.5) * 2; // -1..1

    targetYaw = -nx * MAX_YAW;
    targetPitch = BASE_PITCH + (-ny * MAX_PITCH);
  }

  function animate() {
    yaw += (targetYaw - yaw) * ease;
    pitch += (targetPitch - pitch) * ease;

    model.cameraOrbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${RADIUS}`;
    requestAnimationFrame(animate);
  }

  // Start animation loop once model is ready
  model.addEventListener('load', () => {
    model.cameraOrbit = `0deg ${BASE_PITCH}deg ${RADIUS}`;
    requestAnimationFrame(animate);
  });

  // Track anywhere in the browser
  window.addEventListener('pointermove', setTargetFromWindow, { passive: true });

  // When cursor leaves the browser window, revert to neutral
  document.addEventListener('mouseleave', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });

  // Also revert if the tab loses focus (nice polish)
  window.addEventListener('blur', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });
})();
</script>

<!-- porcelain material polish -->
<script>
const mv = document.getElementById('heroModel');
if (mv) {
  mv.addEventListener('load', () => {
    if (!mv.model?.materials) return;
    mv.model.materials.forEach(mat => {
      mat.pbrMetallicRoughness.setMetallicFactor(0.0);
      mat.pbrMetallicRoughness.setRoughnessFactor(0.18);
    });
  });
}
</script>

<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
<script nomodule src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-legacy.js"></script>

<script>
  const mv = document.getElementById('heroModel');
  const status = document.getElementById('mvStatus');

  // Tell us if the library loaded at all
  if (!customElements.get('model-viewer')) {
    status.textContent = '❌ model-viewer library did NOT load (script blocked/failing).';
  } else {
    status.textContent = '✅ model-viewer loaded. Waiting for model…';
  }

  mv?.addEventListener('load', () => status.textContent = '✅ GLB loaded and rendered.');
  mv?.addEventListener('error', () => status.textContent = '❌ GLB error (corrupt/unsupported).');
</script>
  
</body>
</html>
