    /* ГўВ”ВЂГўВ”ВЂГўВ”ВЂ CASE STUDY OVERLAY ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    .cs-overlay {
      position: fixed; inset: 0; z-index: 500;
      clip-path: inset(100% 0 0 0 round 0px);
      pointer-events: none; overflow: hidden;
    }
    .cs-overlay.cs-open { pointer-events: all; }
    .cs-inner {
      position: absolute; inset: 0;
      overflow: hidden;
    }
    .cs-inner.cs-scrollable { overflow-y: auto; overflow-x: hidden; }
    .cs-hero {
      position: relative; height: 100vh;
      display: flex; align-items: flex-end; overflow: hidden;
    }
    .cs-hero-bg {
      position: absolute; inset: -10%;
      will-change: transform;
    }
    .cs-hero-content {
      position: relative; z-index: 2;
      padding: clamp(32px,5vw,80px) clamp(32px,5vw,80px) clamp(60px,8vw,120px);
      width: 100%;
    }
    .cs-hero-meta {
      display: flex; gap: 32px; margin-bottom: 32px;
      opacity: 0; transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .cs-hero-meta.revealed { opacity: 1; }
    .cs-hero-meta span {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(9px,0.75vw,11px); letter-spacing: 0.32em;
      text-transform: uppercase; color: rgba(244,241,234,0.55);
    }
    .cs-hero-title {
      font-family: 'Cinema Sunday', serif; font-weight: normal;
      font-size: clamp(52px,7.5vw,140px); line-height: 1.0;
      letter-spacing: 0.02em; color: rgba(244,241,234,0.95);
      margin: 0 0 28px; opacity: 0;
    }
    .cs-hero-title.cs-title-ready { opacity: 1; }
    .cs-hero-statement {
      font-family: 'Montserrat', sans-serif; font-weight: 300;
      font-size: clamp(13px,1.2vw,18px); letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(244,241,234,0.6);
      margin: 0; max-width: 520px;
      opacity: 0; transform: translateY(12px); filter: blur(8px);
      transition: opacity 1s cubic-bezier(0.16,1,0.3,1),
                  transform 1s cubic-bezier(0.16,1,0.3,1),
                  filter 1s cubic-bezier(0.16,1,0.3,1);
    }
    .cs-hero-statement.revealed { opacity: 1; transform: translateY(0); filter: blur(0px); }
    .cs-scroll-hint {
      position: absolute; bottom: clamp(24px,4vh,48px); right: clamp(32px,5vw,80px);
      font-family: 'Montserrat', sans-serif; font-size: clamp(8px,0.65vw,10px);
      letter-spacing: 0.32em; text-transform: uppercase; color: rgba(244,241,234,0.35);
      opacity: 0; transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .cs-scroll-hint.revealed { opacity: 1; }
    .cs-close {
      position: fixed; top: clamp(20px,3vh,36px); right: clamp(24px,3vw,48px);
      z-index: 600; background: none; border: none; cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-size: clamp(8px,0.65vw,10px);
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(244,241,234,0.55); padding: 12px;
      opacity: 0; transition: opacity 0.6s ease, color 0.3s ease;
    }
    .cs-close.revealed { opacity: 1; }
    .cs-close:hover { color: rgba(244,241,234,0.95); }
    .cs-body { background: rgb(244,241,234); padding: clamp(80px,10vw,160px) clamp(32px,5vw,80px); }
    .cs-section { margin-bottom: clamp(80px,10vw,160px); }
    .cs-section-label {
      font-family: 'Montserrat', sans-serif; font-size: clamp(8px,0.65vw,10px);
      letter-spacing: 0.32em; text-transform: uppercase; color: rgba(18,18,18,0.35);
      margin-bottom: 24px; display: block;
    }
    .cs-brief {
      font-family: 'Montserrat', sans-serif; font-weight: 300;
      font-size: clamp(16px,1.6vw,24px); line-height: 1.65; color: rgba(18,18,18,0.75);
      max-width: 680px;
    }
    .cs-details { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 48px; }
    .cs-detail-label {
      font-family: 'Montserrat', sans-serif; font-size: clamp(8px,0.65vw,10px);
      letter-spacing: 0.28em; text-transform: uppercase; color: rgba(18,18,18,0.35);
      margin-bottom: 10px;
    }
    .cs-detail-val {
      font-family: 'Montserrat', sans-serif; font-size: clamp(11px,1.3vw,15px);
      letter-spacing: 0.08em; color: rgba(18,18,18,0.7); line-height: 1.6;
    }
    .cs-img-full {
      width: calc(100% + clamp(64px,10vw,160px));
      margin-left: calc(-1 * clamp(32px,5vw,80px));
      aspect-ratio: 16/9; overflow: hidden;
      margin-bottom: clamp(80px,10vw,160px);
    }
    .cs-img-full-inner {
      width: 100%; height: 100%; background-size: cover; background-position: center;
    }
    .cs-img-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
      width: calc(100% + clamp(64px,10vw,160px));
      margin-left: calc(-1 * clamp(32px,5vw,80px));
      margin-bottom: clamp(80px,10vw,160px);
    }
    .cs-img-half { aspect-ratio: 4/5; overflow: hidden; }
    .cs-img-half-inner { width: 100%; height: 100%; background-size: cover; background-position: center; }
    .cs-statement-large {
      font-family: 'Cinema Sunday', serif; font-weight: normal;
      font-size: clamp(36px,5.5vw,96px); line-height: 1.1; letter-spacing: 0.02em;
      color: rgba(18,18,18,0.85); max-width: 900px;
      margin-bottom: clamp(80px,10vw,160px);
    }
    .cs-outcome { padding: clamp(48px,6vw,96px); background: rgba(18,18,18,0.04); border-radius: 4px; }
    .cs-outcome-text {
      font-family: 'Montserrat', sans-serif; font-weight: 300;
      font-size: clamp(14px,1.2vw,18px); line-height: 1.7; color: rgba(18,18,18,0.65);
      max-width: 560px;
    }
    .cs-reveal {
      opacity: 0; transform: translateY(32px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .cs-reveal.revealed { opacity: 1; transform: translateY(0); }
  </style>

    (function () {
      const spotlight = document.getElementById('cursorSpotlight');
      const shadowEl = document.getElementById('groundShadow');
      let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
      let curX = mouseX, curY = mouseY;
      let hasEntered = false;
      const LERP = 0.08;
      document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; hasEntered = true; });
      function tick() {
        curX += (mouseX - curX) * LERP;
        curY += (mouseY - curY) * LERP;
        if (!hasEntered) { requestAnimationFrame(tick); return; }
        const W = window.innerWidth, H = window.innerHeight;
        const dx = (curX - W * 0.5) / (W * 0.5);
        const dy = (curY - H * 0.5) / (H * 0.5);
        const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 1.0);
        const blend = dist * 0.8;
        if (blend < 0.02) {
          spotlight.style.opacity = '0';
        } else {
          spotlight.style.opacity = blend.toFixed(3);
          spotlight.style.background = `
            radial-gradient(320px circle at ${curX}px ${curY}px, rgba(255,242,210,0.10) 0%, rgba(255,238,195,0.04) 50%, transparent 100%),
            radial-gradient(800px circle at ${curX}px ${curY}px, transparent 0%, transparent 25%, rgba(12,10,6,0.05) 60%, rgba(12,10,6,0.13) 100%)`;
        }
        if (shadowEl) {
          const cx = mouseX / W - 0.5;
          const adist = Math.abs(cx);
          shadowEl.style.transform = `translateX(calc(-50% + ${(-cx*120).toFixed(1)}px)) scaleX(${(0.8+adist*2).toFixed(3)})`;
          shadowEl.style.filter = `blur(${(8+adist*20).toFixed(1)}px)`;
          shadowEl.style.opacity = Math.min(0.08+adist*0.25, 0.4).toFixed(3);
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();

    // ГўВ”ВЂГўВ”ВЂ Bust reveal ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
    (function () {

      var bustEl = document.querySelector('.rx-bust');

      var fired = false;
      function revealBust() {
        if (fired) return; fired = true;
        var elapsed = Date.now() - PAGE_START;
        var delay = Math.max(0, BUST_DELAY - elapsed);
        bustEl.style.animation = 'revealBust 2.4s cubic-bezier(0.16,1,0.3,1) ' + delay + 'ms forwards';
      }
      var cap = setTimeout(revealBust, MAX_WAIT);
      if (bustImg.complete && bustImg.naturalWidth > 0) { clearTimeout(cap); revealBust(); }
      else {
        bustImg.addEventListener('load', function() { clearTimeout(cap); revealBust(); });
        bustImg.addEventListener('error', function() { clearTimeout(cap); revealBust(); });
      }
    })();

      var wxCards = document.querySelectorAll('.wx-card');

      var WX_CLIP_DUR = 900, WX_CLIP_EASE = 'cubic-bezier(0.76,0,0.24,1)';
      var WX_STAGGER = 200;

      function splitTextToChars(el) {
        var innerSpans = [];
        var nodes = Array.from(el.childNodes);
        el.innerHTML = '';
        nodes.forEach(function(node) {
          if (node.nodeType === 3) {
            var text = node.textContent;
            for (var i = 0; i < text.length; i++) {
              var outer = document.createElement('span');
              outer.style.cssText = 'overflow:hidden;display:inline-block;vertical-align:top;';
              var inner = document.createElement('span');
              inner.style.cssText = 'display:inline-block;';
              inner.textContent = text[i];
              outer.appendChild(inner);
              el.appendChild(outer);
              innerSpans.push(inner);
            }
          } else if (node.nodeType === 1) {
            el.appendChild(node.cloneNode(true));
          }
        });
        return innerSpans;
      }

      function fireWork() {
        if (wxFired) return; wxFired = true;
        wxWraps.forEach(function(wrap) {
          var card = wrap.querySelector('.wx-card');
          card.style.clipPath = 'inset(100% 0 0 0)';
          wrap.style.opacity = '1';
          wrap.querySelectorAll('.work-card-num, .work-card-cat, .work-card-arrow')
            .forEach(function(t) { t.style.opacity = '0'; t.style.transform = 'translateY(20px)'; });
          var titleEl = wrap.querySelector('.work-card-title');
          titleEl.style.opacity = '0';
          var chars;
          if (titleEl._charSpans && titleEl._charSpans.length > 0) {
            chars = titleEl._charSpans;
          } else {
            chars = splitTextToChars(titleEl);
            titleEl._charSpans = chars;
          }
          chars.forEach(function(ch) { ch.style.transform = 'translateY(110%)'; });
        });
        wxWraps.forEach(function(wrap, i) {
          var card = wrap.querySelector('.wx-card');
          var delay = i * WX_STAGGER;
          var a = card.animate([
            { clipPath: 'inset(100% 0 0 0)' },
            { clipPath: 'inset(0% 0 0 0)' }
          ], { duration: WX_CLIP_DUR, delay: delay, easing: WX_CLIP_EASE, fill: 'forwards' });
          a.onfinish = function() {
            card.style.clipPath = 'none';
            wrap.querySelectorAll('.work-card-num, .work-card-cat')
              .forEach(function(t, j) {
                t.animate([
                  { transform: 'translateY(20px)', opacity: '0' },
                  { transform: 'translateY(0px)', opacity: '1' }

              });
            var titleEl = wrap.querySelector('.work-card-title');
            titleEl.style.opacity = '1';
            var chars = titleEl._charSpans || [];
            chars.forEach(function(ch, j) {
              ch.animate([
                { transform: 'translateY(110%)' },
                { transform: 'translateY(0%)' }
              ], { duration: 600, delay: j * 22, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
            });
            var arrow = wrap.querySelector('.work-card-arrow');
            if (arrow) {
              var arrowDelay = Math.floor(chars.length * 22 * 0.4);
              arrow.animate([
                { transform: 'translateY(20px)', opacity: '0' },
                { transform: 'translateY(0px)', opacity: '1' }
              ], { duration: 500, delay: arrowDelay, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
            }
          };
          wxAnims.push(a);
        });
        initWxParallax();
      }

      function resetWork() {
        wxFired = false;
        wxAnims.forEach(function(a) { try { a.cancel(); } catch(e) {} }); wxAnims = [];
        wxWraps.forEach(function(wrap) {
          wrap.style.opacity = '0';
          wrap.style.transform = '';
          var card = wrap.querySelector('.wx-card');
          if (card) {
            card.getAnimations().forEach(function(a) { a.cancel(); });
            card.style.clipPath = '';
            card.style.transform = '';
            card.style.boxShadow = '';
            card.style.filter = '';
          }
          wrap.querySelectorAll('.work-card-num, .work-card-cat, .work-card-arrow')

          if (titleEl) {
            titleEl.style.opacity = '0';

              titleEl._charSpans.forEach(function(ch) {
                try { ch.getAnimations().forEach(function(a) { a.cancel(); }); ch.style.transform = 'translateY(110%)'; } catch(e) {}
              });
            }
          }
        });
      }

      var wxParallaxInit = false;
      function initWxParallax() {
        if (wxParallaxInit) return; wxParallaxInit = true;
        wxWraps.forEach(function(wrap) {
          var card = wrap.querySelector('.wx-card');
          wrap.addEventListener('mouseenter', function() {
            card.style.transition = 'transform 0.55s cubic-bezier(0.16,1,0.3,1), box-shadow 0.45s ease';
            card.style.transform = 'scale(1.04)';
            card.style.boxShadow = '0 40px 100px rgba(0,0,0,0.5), 0 15px 35px rgba(0,0,0,0.25)';
            wxWraps.forEach(function(other) {
              if (other !== wrap) {
                var otherCard = other.querySelector('.wx-card');
                otherCard.style.transition = 'filter 0.55s cubic-bezier(0.16,1,0.3,1), transform 0.55s cubic-bezier(0.16,1,0.3,1)';
                otherCard.style.filter = 'blur(3px) brightness(0.7)';
                otherCard.style.transform = 'scale(0.97)';
              }
            });
          });
          wrap.addEventListener('mousemove', function(e) {
            var rect = wrap.getBoundingClientRect();
            var dx = (e.clientX - rect.left) / rect.width - 0.5;
            var dy = (e.clientY - rect.top) / rect.height - 0.5;
            card.style.transition = 'transform 0.1s ease-out';
            card.style.transform = 'scale(1.04) rotateY(' + (dx * 14) + 'deg) rotateX(' + (-dy * 8) + 'deg)';
          });
          wrap.addEventListener('mouseleave', function() {
            card.style.transition = 'transform 0.9s cubic-bezier(0.16,1,0.3,1), box-shadow 0.6s ease';
            card.style.transform = '';
            card.style.boxShadow = '';
            wxWraps.forEach(function(other) {
              if (other !== wrap) {
                var otherCard = other.querySelector('.wx-card');
                otherCard.style.transition = 'filter 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1)';

                otherCard.style.transform = '';
              }
            });
          });
          wrap.addEventListener('click', function() {
            if (!wxFired) return;
            openCaseStudy(Array.from(wxWraps).indexOf(wrap));
          });
        });
      }

          { clipPath: startClip },
          { clipPath: endClip }
        ], { duration: 800, easing: 'cubic-bezier(0.76,0,0.24,1)', fill: 'forwards' });

        expandAnim.finished.then(function() {
          csOverlay.style.clipPath = endClip;
          csInner.classList.add('cs-scrollable');
          buildCsBody(idx);
          fireCsHero(data);
        });
      }

      function fireCsHero(data) {
        var heroMeta = document.getElementById('cs-hero-meta');
        var heroTitle = document.getElementById('cs-hero-title');
        var heroStmt = document.getElementById('cs-hero-statement');
        var scrollHint = document.getElementById('cs-scroll-hint');
        var csClose = document.getElementById('cs-close');

        // Meta reveal
        setTimeout(function() { heroMeta.classList.add('revealed'); }, 80);

        // Title: char-by-char
        var titleLines = data.title.split('\n');
        heroTitle.innerHTML = '';
        titleLines.forEach(function(line, li) {
          if (li > 0) heroTitle.appendChild(document.createElement('br'));
          var lineEl = document.createElement('span');
          lineEl.style.cssText = 'display:inline;';
          lineEl.textContent = line;
          heroTitle.appendChild(lineEl);
        });
        heroTitle.classList.add('cs-title-ready');

        var chars;
        if (heroTitle._charSpans && heroTitle._charSpans.length > 0) {
          chars = heroTitle._charSpans;
          chars.forEach(function(ch) {
            ch.getAnimations().forEach(function(a) { a.cancel(); });
            ch.style.transform = 'translateY(110%)';
          });
        } else {
          chars = splitTextToChars(heroTitle);
          heroTitle._charSpans = chars;
        }

        var BASE_DELAY = 180;
        chars.forEach(function(ch, j) {
          ch.animate([
            { transform: 'translateY(110%)' },
            { transform: 'translateY(0%)' }
          ], { duration: 700, delay: BASE_DELAY + j * 20, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
        });

        var stmtDelay = BASE_DELAY + chars.length * 20 * 0.5 + 100;
        setTimeout(function() { heroStmt.classList.add('revealed'); }, stmtDelay);
        setTimeout(function() { scrollHint.classList.add('revealed'); csClose.classList.add('revealed'); }, 500);
      }

      function buildCsBody(idx) {
        var data = CS_DATA[idx];
        var csBody = document.getElementById('cs-body');
        csBody.innerHTML = '';

        // Section 1: Brief + Details
        var sec1 = document.createElement('div');
        sec1.className = 'cs-section cs-reveal';
        sec1.innerHTML = '<span class="cs-section-label">Brief</span>' +
          '<p class="cs-brief">' + data.brief + '</p>' +
          '<div class="cs-details">' +
            '<div><div class="cs-detail-label">Role</div><div class="cs-detail-val">' + data.role + '</div></div>' +
            '<div><div class="cs-detail-label">Year</div><div class="cs-detail-val">' + data.year_full + '</div></div>' +
          '</div>';
        csBody.appendChild(sec1);

        // Full-bleed image placeholder
        var imgFull = document.createElement('div');
        imgFull.className = 'cs-img-full cs-reveal';
        imgFull.innerHTML = '<div class="cs-img-full-inner" style="background:' + data.bg + ';"></div>';
        csBody.appendChild(imgFull);

        // Large typographic statement
        var stmt = document.createElement('div');
        stmt.className = 'cs-statement-large cs-reveal';
        stmt.textContent = '\u201c' + data.statement.replace('.','') + '.\u201d';
        csBody.appendChild(stmt);

        // Two-up images
        var imgRow = document.createElement('div');
        imgRow.className = 'cs-img-row cs-reveal';
        imgRow.innerHTML =
          '<div class="cs-img-half"><div class="cs-img-half-inner" style="background:' + data.bg + ';filter:brightness(0.85);"></div></div>' +
          '<div class="cs-img-half"><div class="cs-img-half-inner" style="background:' + data.bg + ';filter:brightness(1.1) saturate(0.8);"></div></div>';
        csBody.appendChild(imgRow);

        // Outcome
        var outcome = document.createElement('div');
        outcome.className = 'cs-section cs-reveal';
        outcome.innerHTML = '<span class="cs-section-label">Outcome</span>' +
          '<div class="cs-outcome"><p class="cs-outcome-text">' + data.outcome + '</p></div>';
        csBody.appendChild(outcome);

        // IntersectionObserver for reveals
        if (csObserver) { csObserver.disconnect(); }
        csObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              csObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12, root: document.getElementById('cs-inner') });

        csBody.querySelectorAll('.cs-reveal').forEach(function(el) {
          csObserver.observe(el);
        });

        // Hero bg parallax on scroll
        var csInner = document.getElementById('cs-inner');
        var heroBg = document.getElementById('cs-hero-bg');
        csInner.addEventListener('scroll', function() {
          var scrollY = csInner.scrollTop;
          heroBg.style.transform = 'translateY(' + (scrollY * 0.25) + 'px)';
        }, { passive: true });
      }

      function closeCaseStudy() {
        var csOverlay = document.getElementById('cs-overlay');
        var csInner = document.getElementById('cs-inner');
        var heroMeta = document.getElementById('cs-hero-meta');
        var heroStmt = document.getElementById('cs-hero-statement');
        var scrollHint = document.getElementById('cs-scroll-hint');
        var csClose = document.getElementById('cs-close');

        // Remove hero chrome
        heroMeta.classList.remove('revealed');
        heroStmt.classList.remove('revealed');
        scrollHint.classList.remove('revealed');
        csClose.classList.remove('revealed');

        // Lock scroll instantly
        csInner.classList.remove('cs-scrollable');
        csInner.scrollTop = 0;

        // Restore hero bg parallax
        var heroBg = document.getElementById('cs-hero-bg');
        heroBg.style.transform = '';

        // Collapse back to card rect
        var idx = csActiveIdx;
        var r = csStoredRects[idx];
        var vw = window.innerWidth, vh = window.innerHeight;
        var endClip = 'inset(' + r.top.toFixed(1) + 'px ' + (vw - r.right).toFixed(1) + 'px ' + (vh - r.bottom).toFixed(1) + 'px ' + r.left.toFixed(1) + 'px round 3px)';

        // Cancel any lingering fills (expandAnim etc.) before collapse starts,
        // then pin the inline style so the starting position is unambiguous.
        csOverlay.getAnimations().forEach(function(a) { a.cancel(); });
        csOverlay.style.clipPath = 'inset(0px 0px 0px 0px round 0px)';

        var collapseAnim = csOverlay.animate([
          { clipPath: 'inset(0px 0px 0px 0px round 0px)' },
          { clipPath: endClip }
        ], { duration: 700, easing: 'cubic-bezier(0.76,0,0.24,1)', fill: 'none' });

        // onfinish fires synchronously in the same animation frame, before the
        // browser paints ГўВЂВ” so there is no visible full-screen flash between
        // the animation ending and the overlay being hidden.
        collapseAnim.onfinish = function() {
          csOverlay.classList.remove('cs-open');
          csOverlay.style.clipPath = 'inset(100% 0 0 0 round 0px)';
          csActiveIdx = -1;
          // Cancel sibling card opacity animations and restore
          wxWraps.forEach(function(w) {
            var c = w.querySelector('.wx-card');
            c.getAnimations().forEach(function(a) { a.cancel(); });
            c.style.opacity = '';
          });
        };
      }

      document.getElementById('cs-close').addEventListener('click', closeCaseStudy);

      // ГўВ”ВЂГўВ”ВЂ Delta handler ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
      function slidePanel(panel, target, cb) {
        var from = getComputedStyle(panel).transform;
        var a = panel.animate(
          [{ transform: from }, { transform: 'translateY(' + target + ')' }],
          { duration: 900, easing: 'cubic-bezier(0.76,0,0.24,1)', fill: 'forwards' }
        );
        a.onfinish = function() { panel.style.transform = 'translateY(' + target + ')'; if (cb) cb(); };
      }

      function goToBW() {
        animating = true; accum = 0;
        slidePanel(panelBW, '0%', function() { state = 'bw'; animating = false; fireBW(); });
      }
      function goToContent() {
        animating = true; accum = 0;
        slidePanel(panelContent, '0%', function() { state = 'content'; animating = false; fireWork(); });
      }
      function goToHero() {
        animating = true; accum = 0;
        resetBW();
        slidePanel(panelBW, '100%', function() { state = 'hero'; animating = false; });
      }
      function goToBWFromContent() {
        animating = true; accum = 0;
        resetWork();
        slidePanel(panelContent, '100%', function() { state = 'bw'; animating = false; });
      }

      function handleDelta(dy) {
        if (animating) return;
        var now = Date.now();
        if (now - lastWheel > 500) accum = 0;
        lastWheel = now;
        if (state === 'content') {
          if (dy > 0) { panelContent.scrollTop += dy; accum = 0; return; }
          if (panelContent.scrollTop > 0) { panelContent.scrollTop += dy; accum = 0; return; }
          accum += dy;
          if (accum < -THRESHOLD) goToBWFromContent();
          return;
        }
        accum += dy;
        if (state === 'hero' && accum > THRESHOLD) goToBW();
        if (state === 'bw' && accum > THRESHOLD) goToContent();
        if (state === 'bw' && accum < -THRESHOLD) goToHero();
      }

      window.addEventListener('wheel', function(e) {
        e.preventDefault();
        var dy = e.deltaMode === 1 ? e.deltaY * 20 : e.deltaY;
        handleDelta(dy);
      }, { passive: false });

      window.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
          e.preventDefault(); handleDelta(THRESHOLD + 10);
        } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
          e.preventDefault(); handleDelta(-(THRESHOLD + 10));
        }
      });

      var touchStartY = 0;
      window.addEventListener('touchstart', function(e) { touchStartY = e.touches[0].clientY; }, { passive: true });
      window.addEventListener('touchend', function(e) {
        var dy = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(dy) > 40) handleDelta(dy * 3.5);
      }, { passive: true });
    })();
  </script>
