<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
  <style>
    #sculptureCanvas {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-title reveal reveal-delay-1">
        <span class="hero-word left">CREATIVE</span>
        <span class="hero-word right">DIRECTOR</span>
      </div>

      <div class="hero-bust">
        <div class="hero-sculpture" id="heroStage">
          <canvas id="sculptureCanvas"></canvas>
          <span class="shadow" aria-hidden="true"></span>
        </div>
      </div>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work"    style="height:50vh;"></section>
  <section id="about"   style="height:50vh;"></section>
  <section id="contact" style="height:50vh;"></section>
</main>

<script>
window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  });
});
</script>

<!-- Three.js importmap — must come before any type="module" script -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE                      from 'three';
import { GLTFLoader }                  from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }                 from 'three/addons/loaders/DRACOLoader.js';

// ─────────────────────────────────────────────────────────────────────────────
//  TUNEABLE — tweak here without touching the rest of the code
// ─────────────────────────────────────────────────────────────────────────────
const CFG = {
  // Camera
  fov:          28,     // telephoto — matches reference render, no facial distortion
  canvasW:      820,
  canvasH:      1060,

  // How much of the frame height the bust should fill (1.0 = perfect fit)
  frameFill:    0.86,

  // Tone mapping exposure — keep ≤ 1 to avoid blowing out the white porcelain
  exposure:     0.80,

  // Lights  — intensities tuned against the reference image:
  //   soft overall illumination, key from upper-left, no harsh specular
  ambientColor: 0xfff8f2,  ambientIntensity:  0.72,   // warm fill, stops shadows going black
  keyColor:     0xffffff,  keyIntensity:      0.68,   // main shape-defining light, upper-left
  fillColor:    0xe8f0ff,  fillIntensity:     0.20,   // cool fill, right side
  rimColor:     0xffffff,  rimIntensity:      0.14,   // top rim, picks out hair edges

  // Interaction
  maxRotY:  0.30,   // radians left/right  (~17°)
  maxRotX:  0.18,   // radians up/down     (~10°)
  ease:     0.07,
};
// ─────────────────────────────────────────────────────────────────────────────

const stage  = document.getElementById('heroStage');
const canvas = document.getElementById('sculptureCanvas');

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({
  canvas,
  alpha:              true,   // transparent bg → page cream shows through
  antialias:          true,
  premultipliedAlpha: false,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(CFG.canvasW, CFG.canvasH);
renderer.outputColorSpace   = THREE.SRGBColorSpace;
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = CFG.exposure;
renderer.setClearColor(0x000000, 0);  // fully transparent clear

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();

// ── Camera ────────────────────────────────────────────────────────────────────
// Telephoto (28°) collapses depth the same way a portrait lens does —
// the reference image has this compressed, sculpture-photo quality.
const camera = new THREE.PerspectiveCamera(
  CFG.fov,
  CFG.canvasW / CFG.canvasH,
  0.01, 200
);

// ── Lighting ──────────────────────────────────────────────────────────────────
// Reference image analysis:
//   • Overall tone is very even and soft — no single harsh source
//   • Key light from upper-left casts gentle shadows on the right cheek
//   • Right side is dimly filled (not black), cool-tinted
//   • Top of head catches a faint rim
//   • Zero blown-out specular on the white surfaces

const ambientLight = new THREE.AmbientLight(CFG.ambientColor, CFG.ambientIntensity);
scene.add(ambientLight);

// Key — upper-left, forward
const keyLight = new THREE.DirectionalLight(CFG.keyColor, CFG.keyIntensity);
keyLight.position.set(-1.6, 2.8, 3.2);
scene.add(keyLight);

// Fill — right side, cool tint, very soft
const fillLight = new THREE.DirectionalLight(CFG.fillColor, CFG.fillIntensity);
fillLight.position.set(3.0, 0.8, 2.0);
scene.add(fillLight);

// Rim — directly above, just separates hair from background
const rimLight = new THREE.DirectionalLight(CFG.rimColor, CFG.rimIntensity);
rimLight.position.set(0, 6, 0.5);
scene.add(rimLight);

// ── Load GLB ──────────────────────────────────────────────────────────────────
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

let modelGroup = null;

loader.load(
  '/assets/porcelain_girl_2_opt.glb',
  (gltf) => {
    const model = gltf.scene;

    // ── Centre on bounding box ─────────────────────────────────────────────
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    model.position.sub(center);  // move pivot to geometric centre

    modelGroup = new THREE.Group();
    modelGroup.add(model);
    scene.add(modelGroup);

    // ── Position camera to frame the bust like the reference ───────────────
    // Place camera so the bust fills `frameFill` of the vertical FOV.
    // Then nudge slightly upward so we look at the face, not the base.
    const fovRad   = camera.fov * (Math.PI / 180);
    const distance = (size.y * CFG.frameFill) / (2 * Math.tan(fovRad / 2));
    const eyeY     = size.y * 0.05;   // camera sits slightly above mid-height

    camera.position.set(0, eyeY, distance);
    camera.lookAt(0, eyeY, 0);
    camera.updateProjectionMatrix();
  },
  undefined,
  (err) => console.error('GLB load error:', err)
);

// ── Mouse-driven rotation ─────────────────────────────────────────────────────
let targetRX = 0, targetRY = 0;
let currentRX = 0, currentRY = 0;

stage.addEventListener('pointermove', (e) => {
  const r  = stage.getBoundingClientRect();
  const nx = ((e.clientX - r.left) / r.width  - 0.5) * 2;  // −1 .. 1
  const ny = ((e.clientY - r.top)  / r.height - 0.5) * 2;
  targetRY =  nx * CFG.maxRotY;
  targetRX = -ny * CFG.maxRotX;
}, { passive: true });

stage.addEventListener('pointerleave', () => { targetRX = 0; targetRY = 0; });
window.addEventListener('blur',        () => { targetRX = 0; targetRY = 0; });

// ── Render loop ───────────────────────────────────────────────────────────────
function tick() {
  requestAnimationFrame(tick);

  currentRX += (targetRX - currentRX) * CFG.ease;
  currentRY += (targetRY - currentRY) * CFG.ease;

  if (modelGroup) {
    modelGroup.rotation.x = currentRX;
    modelGroup.rotation.y = currentRY;
  }

  renderer.render(scene, camera);
}

tick();

// ── Responsive resize ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  if (w > 0 && h > 0) {
    renderer.setSize(w, h, false);  // false = don't set CSS, just canvas attrs
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
});

</script>

</body>
</html>
