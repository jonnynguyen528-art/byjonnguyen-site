<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-title reveal reveal-delay-1">
        <span class="hero-word left">CREATIVE</span>
        <span class="hero-word right">DIRECTOR</span>
      </div>

      <div class="hero-bust">
        <model-viewer
          id="heroModel"
          src="/assets/porcelain_girl_2.glb"
          alt="Porcelain sculpture"
          loading="eager"
          reveal="auto"
          environment-image="neutral"
          exposure="1.05"
          camera-controls
          disable-pan
          camera-orbit="-18deg 68deg 2.4m"
          min-camera-orbit="-18deg 68deg 2.4m"
          max-camera-orbit="-18deg 68deg 2.4m"
          min-field-of-view="20deg"
          max-field-of-view="20deg"
          style="width:100%;height:100%;background:transparent;">
        </model-viewer>

        <div id="mvStatus" class="mv-status"></div>
      </div>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work" style="height: 50vh;"></section>
  <section id="about" style="height: 50vh;"></section>
  <section id="contact" style="height: 50vh;"></section>
</main>

<!-- model-viewer -->
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
<script nomodule src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-legacy.js"></script>

<!-- reveal animation -->
<script>
window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  });
});
</script>

<!-- cursor tracking luxury rotation + hard zoom lock (wheel) + status -->
<script>
(() => {
  const mv = document.getElementById('heroModel');
  const status = document.getElementById('mvStatus');
  if (!mv) return;

  // ---- HERO RESTING ORBIT (reference composition) ----
  const BASE_YAW   = -18;   // theta
  const BASE_PITCH = 68;    // phi
  const BASE_R     = 2.4;   // meters

  // ---- SUBTLE LUXURY DRIFT RANGE ----
  const MAX_YAW   = 6;      // degrees left/right from base
  const MAX_PITCH = 4;      // degrees up/down from base
  const EASE      = 0.08;   // smoothing (smaller = smoother/slower)

  let targetYawOffset = 0;
  let targetPitchOffset = 0;
  let yawOffset = 0;
  let pitchOffset = 0;

  // Stop wheel zoom when the wheel originates over the model-viewer
  window.addEventListener('wheel', (e) => {
    const path = e.composedPath?.() || [];
    if (path.includes(mv)) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, { passive: false, capture: true });

  function setTargetFromPointer(e) {
    const x = e.clientX / window.innerWidth;   // 0..1
    const y = e.clientY / window.innerHeight;  // 0..1
    const nx = (x - 0.5) * 2; // -1..1
    const ny = (y - 0.5) * 2; // -1..1

    // Invert as needed for “feels right”
    targetYawOffset = (-nx * MAX_YAW);
    targetPitchOffset = (-ny * MAX_PITCH);
  }

  function applyOrbit() {
    yawOffset += (targetYawOffset - yawOffset) * EASE;
    pitchOffset += (targetPitchOffset - pitchOffset) * EASE;

    const yaw = BASE_YAW + yawOffset;
    const pitch = BASE_PITCH + pitchOffset;

    const orbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${BASE_R}m`;
    mv.cameraOrbit = orbit;

    requestAnimationFrame(applyOrbit);
  }

  // Polished return to rest
  function resetToRest() {
    targetYawOffset = 0;
    targetPitchOffset = 0;
  }

  // Status (optional)
  if (status) {
    if (!customElements.get('model-viewer')) {
      status.textContent = '❌ model-viewer did NOT load.';
    } else {
      status.textContent = '✅ model-viewer loaded. Waiting for GLB…';
    }
  }

  mv.addEventListener('load', () => {
    if (status) status.textContent = '✅ GLB loaded.';
    mv.cameraOrbit = `${BASE_YAW}deg ${BASE_PITCH}deg ${BASE_R}m`;
    requestAnimationFrame(applyOrbit);
  });

  mv.addEventListener('error', () => {
    if (status) status.textContent = '❌ GLB error (path/cors/corrupt).';
  });

  // Track cursor anywhere in the browser
  window.addEventListener('pointermove', setTargetFromPointer, { passive: true });

  // When cursor leaves page or tab loses focus, return to rest
  document.addEventListener('mouseleave', resetToRest);
  window.addEventListener('blur', resetToRest);
})();
</script>

<!-- porcelain material polish -->
<script>
(() => {
  const mv = document.getElementById('heroModel');
  if (!mv) return;

  mv.addEventListener('load', () => {
    const mats = mv.model?.materials;
    if (!mats?.length) return;

    mats.forEach((mat) => {
      const pbr = mat.pbrMetallicRoughness;
      if (!pbr) return;
      pbr.setMetallicFactor(0.0);
      pbr.setRoughnessFactor(0.18);
    });
  });
})();
</script>

</body>
</html>
