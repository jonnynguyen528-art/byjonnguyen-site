@font-face {
  font-family: 'Cinema Sunday';
  src: url('assets/fonts/cinema-sunday.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

/* ─── FULL-PAGE PANEL SYSTEM ─────────────────────────────────────
   html/body locked to viewport. Three fixed panels stacked by z-index.
   JS drives all transitions — no CSS scroll-snap.
──────────────────────────────────────────────────────────────────*/

html, body {
  height: 100%;
  overflow: hidden;
  margin: 0;
}

.panel {
  position: fixed;
  inset: 0;
  will-change: transform;
}

#panel-hero    { z-index: 1; }
#panel-bw      { z-index: 2; transform: translateY(100%); background: rgb(244,241,234); }
#panel-content { z-index: 3; transform: translateY(100%); background: rgb(244,241,234); overflow-y: hidden; }

/* Transition class applied by JS during moves */
.panel-moving {
  transition: transform 0.88s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ─── NAV ────────────────────────────────────────────────────────*/

body { font-family: 'Montserrat', sans-serif; }

.brand {
  font-family: 'Cinema Sunday', serif;
  font-weight: normal;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-size: 2.2rem;
  line-height: 1;
}

.nav a {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-size: 0.75rem;
}

/* ─── HERO ───────────────────────────────────────────────────────*/

.hero-center {
  height: 100%;
  overflow: hidden;
  position: relative;
  align-items: flex-start;
}

.hero-composition {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  overflow: visible;
}

.hero-word-col {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding-top: calc(clamp(320px, 58vw, 680px) * 0.27);
  position: relative;
  z-index: 1;
}

.word-mask { overflow: hidden; display: inline-block; }

.hero-word-col.left  { justify-content: flex-end;  margin-right: clamp(-150px, -21vw, -260px); }
.hero-word-col.right { justify-content: flex-start; margin-left:  clamp(-150px, -21vw, -260px); }

.hero-word {
  display: block;
  font-family: 'Cinema Sunday', serif;
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1;
  font-size: clamp(32px, 5vw, 82px);
  color: rgba(18,18,18,0.88);
  white-space: nowrap;
}

@media (max-width: 900px) {
  .hero-word-col { padding-top: calc(clamp(240px, 48vw, 480px) * 0.22); }
  .hero-word-col.left  { margin-right: clamp(-60px, -12vw, -140px); }
  .hero-word-col.right { margin-left:  clamp(-60px, -12vw, -140px); }
  .hero-word { font-size: clamp(22px, 4.2vw, 52px); }
}

@media (max-width: 600px) {
  .hero-composition { flex-direction: row; align-items: flex-start; overflow: visible; }
  .hero-word-col { flex: 1; padding-top: calc(62vw * 0.27) !important; }
  .hero-word-col.left  { justify-content: flex-end;  margin-right: clamp(-40px, -11vw, -60px) !important; }
  .hero-word-col.right { justify-content: flex-start; margin-left:  clamp(-40px, -11vw, -60px) !important; }
  .hero-word { font-size: clamp(16px, 6.5vw, 28px); text-align: unset; white-space: nowrap; }
}

.hero-bust-img {
  display: block;
  width: 100%;
  height: auto;
  user-select: none;
  pointer-events: none;
}

@keyframes floaty {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-14px); }
}

.hero-sculpture { animation: floaty 6s ease-in-out infinite; }

#cursorSpotlight {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.8s ease;
}

#groundShadow {
  position: absolute;
  bottom: 3%;
  left: 50%;
  width: 52%;
  height: 28px;
  background: radial-gradient(ellipse at center,
    rgba(0,0,0,0.32) 0%, rgba(0,0,0,0.12) 45%, transparent 70%);
  transform: translateX(-50%);
  opacity: 0;
  pointer-events: none;
  will-change: transform, opacity, filter;
}

/* ─── HERO REVEAL ANIMATIONS ─────────────────────────────────────*/

.rx { opacity: 0; }

.rx-creative { animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards; }
.rx-director { animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.85s forwards; }
.rx-bust     { /* triggered by JS */ }

@keyframes revealWord {
  0%   { opacity: 0; transform: translateY(110%); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes revealBust {
  0%   { opacity: 0; transform: translateY(32px); }
  100% { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .rx-creative { animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards; }
  .rx-director { animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards; }
  .rx-bust     { animation: revealBust 2.2s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards; }
}

/* ─── BUILDING WORLDS PANEL ──────────────────────────────────────*/

.bw-section {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.bw-word-wrap {
  overflow: hidden;
  display: block;
  line-height: 1.0;
}

.bw-word {
  display: block;
  font-family: 'Cinema Sunday', serif;
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: clamp(52px, 10vw, 156px);
  color: rgba(18,18,18,0.88);
  opacity: 0;
  transform: translateY(115%);
  transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1),
              transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform, opacity;
}

.bw-word.revealed { opacity: 1; transform: translateY(0); }

.bw-rule {
  width: 0;
  height: 1px;
  background: rgba(18,18,18,0.18);
  margin: 40px auto;
  transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.bw-rule.revealed { width: clamp(100px, 20vw, 280px); }

.bw-tagline {
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  font-size: clamp(9px, 0.85vw, 11px);
  color: rgba(18,18,18,0.45);
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1),
              transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.bw-tagline.revealed { opacity: 1; transform: translateY(0); }

@media (max-width: 600px) {
  .bw-word { font-size: clamp(38px, 13vw, 76px); }
  .bw-rule { margin: 28px auto; }
}

/* ─── CONTENT PANEL ──────────────────────────────────────────────*/

<script>
// ── Cursor spotlight ──────────────────────────────────────────────
(function () {
  const spotlight = document.getElementById('cursorSpotlight');
  const shadowEl  = document.getElementById('groundShadow');
  let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
  let curX = mouseX, curY = mouseY;
  let hasEntered = false;
  const LERP = 0.08;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY; hasEntered = true;
  });

  function tick() {
    curX += (mouseX - curX) * LERP;
    curY += (mouseY - curY) * LERP;
    if (!hasEntered) { requestAnimationFrame(tick); return; }
    const W = window.innerWidth, H = window.innerHeight;
    const dx = (curX - W * 0.5) / (W * 0.5);
    const dy = (curY - H * 0.5) / (H * 0.5);
    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 1.0);
    const blend = dist * 0.8;
    if (blend < 0.02) {
      spotlight.style.opacity = '0';
    } else {
      spotlight.style.opacity = blend.toFixed(3);
      spotlight.style.background = `
        radial-gradient(320px circle at ${curX}px ${curY}px,
          rgba(255,242,210,0.10) 0%, rgba(255,238,195,0.04) 50%, transparent 100%),
        radial-gradient(800px circle at ${curX}px ${curY}px,
          transparent 0%, transparent 25%,
          rgba(12,10,6,0.05) 60%, rgba(12,10,6,0.13) 100%)`;
    }
    if (shadowEl) {
      const cx = mouseX / W - 0.5;
      const adist = Math.abs(cx);
      shadowEl.style.transform = `translateX(calc(-50% + ${(-cx*120).toFixed(1)}px)) scaleX(${(0.8+adist*2).toFixed(3)})`;
      shadowEl.style.filter    = `blur(${(8+adist*20).toFixed(1)}px)`;
      shadowEl.style.opacity   = Math.min(0.08+adist*0.25, 0.4).toFixed(3);
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

// ── Bust reveal ───────────────────────────────────────────────────
(function () {
  var PAGE_START = Date.now();
  var BUST_DELAY = 1700;
  var MAX_WAIT   = 2500;
  var bustEl  = document.querySelector('.rx-bust');
  var bustImg = document.querySelector('.hero-bust-img');
  var fired = false;
  function revealBust() {
    if (fired) return; fired = true;
    var elapsed = Date.now() - PAGE_START;
    var delay   = Math.max(0, BUST_DELAY - elapsed);
    bustEl.style.animation = 'revealBust 2.4s cubic-bezier(0.16,1,0.3,1) ' + delay + 'ms forwards';
  }
  var cap = setTimeout(revealBust, MAX_WAIT);
  if (bustImg.complete && bustImg.naturalWidth > 0) { clearTimeout(cap); revealBust(); }
  else {
    bustImg.addEventListener('load',  function() { clearTimeout(cap); revealBust(); });
    bustImg.addEventListener('error', function() { clearTimeout(cap); revealBust(); });
  }
})();

// ── Panel scroll system ───────────────────────────────────────────
(function () {
  var panelBW      = document.getElementById('panel-bw');
  var panelContent = document.getElementById('panel-content');

  var DURATION  = 880;   // ms — panel slide duration
  var THRESHOLD = 220;   // wheel px needed to trigger a transition
  var COOLDOWN  = DURATION + 200; // lock period after transition starts

  var state     = 'hero'; // 'hero' | 'bw' | 'content'

  var bwRule     = document.getElementById('bwRule');
  var bwTagline  = document.getElementById('bwTagline');

  function fireBW() {

    setTimeout(function() { bwBuilding.classList.add('revealed'); }, 80);
    setTimeout(function() { bwWorlds.classList.add('revealed');   }, 520);
    setTimeout(function() { bwRule.classList.add('revealed');     }, 980);
    setTimeout(function() { bwTagline.classList.add('revealed');  }, 1260);
  }

  function resetBW() {
    bwFired = false;
    [bwBuilding, bwWorlds, bwRule, bwTagline].forEach(function(el) {
      el.classList.remove('revealed');
    });
  }

  // ── Panel slide ──
         var wxCards = documvar wxCards = document.querySelectorAll('.wx-card');
  var wxWraps = document.querySelectorAll('.work-card-wrap');
  var wxFired = false;
  var wxAnims = [];
  var WX_DUR = 1300, WX_EASE = 'cubic-bezier(0.16,1,0.3,1)';
  var WX_STACK = [
    'translateX(100%) translateZ(-280px) rotateX(14deg)',
    'translateX(0%) translateZ(-120px) rotateX(7deg)',
    'translateX(-100%) translateZ(-380px) rotateX(20deg)'
  ];
  var WX_FINAL = 'translateX(0%) translateZ(0px) rotateX(0deg)';
  function fireWork() {
    if (wxFired) return; wxFired = true;
    wxWraps.forEach(function(wrap) {
      wrap.querySelectorAll('.work-card-num, .work-card-cat, .work-card-title, .work-card-arrow')
        .forEach(function(t) { t.style.opacity = '0'; t.style.transform = 'translateY(16px)'; });
    });
    wxWraps.forEach(function(wrap, i) {
      wrap.style.transform = WX_STACK[i];
      wrap.style.opacity = '0';
      var delay = 60 + i * 200;
      var a = wrap.animate([
        { transform: WX_STACK[i], opacity: '0' },
        { transform: WX_FINAL, opacity: '1' }
      ], { duration: WX_DUR, delay: delay, easing: WX_EASE, fill: 'forwards' });
      a.onfinish = function() {
        wrap.style.transform = '';
        wrap.style.opacity = '';
        wrap.querySelectorAll('.work-card-num, .work-card-cat, .work-card-title, .work-card-arrow')
          .forEach(function(t, j) {
            t.animate([
              { transform: 'translateY(16px)', opacity: '0' },
              { transform: 'translateY(0)', opacity: '1' }
            ], { duration: 550, delay: j * 70, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' });
          });
      };
      wxAnims.push(a);
    });
    initWxParallax();
  }
  function resetWork() {
    wxFired = false;
    wxAnims.forEach(function(a) { try { a.cancel(); } catch(e) {} }); wxAnims = [];
    wxWraps.forEach(function(wrap, i) {
      wrap.style.transform = WX_STACK[i];
      wrap.style.opacity = '0';
      wrap.style.transition = '';
      wrap.querySelectorAll('.work-card-num, .work-card-cat, .work-card-title, .work-card-arrow')
        .forEach(function(t) { t.style.opacity = '0'; t.style.transform = 'translateY(16px)'; });
    });
  }
  var wxParallaxInit = false;
  function initWxParallax() {
    if (wxParallaxInit) return; wxParallaxInit = true;
    wxWraps.forEach(function(wrap) {
      var card = wrap.querySelector('.wx-card');
      wrap.addEventListener('mousemove', function(e) {
        var rect = wrap.getBoundingClientRect();
        var dx = (e.clientX - rect.left) / rect.width - 0.5;
        var dy = (e.clientY - rect.top) / rect.height - 0.5;
        card.style.transition = '';
        card.style.transform = 'rotateY(' + (dx * 10) + 'deg) rotateX(' + (-dy * 6) + 'deg)';
      });
      wrap.addEventListener('mouseleave', function() {
        card.style.transition = 'transform 0.9s cubic-bezier(0.16,1,0.3,1)';
        card.style.transform = 'rotateY(0deg) rotateX(0deg)';
      });
    });
  }

  // ── Delta handler ──
    function slidePanel(panel, target, cb) {
    var from = getComputedStyle(panel).transform;
    var a = panel.animate(
      [{ transform: from }, { transform: 'translateY(' + target + ')' }],
      { duration: 900, easing: 'cubic-bezier(0.76,0,0.24,1)', fill: 'forwards' }
    );
    a.onfinish = function() {
      panel.style.transform = 'translateY(' + target + ')';
      if (cb) cb();
    };
  }
  function goToBW() {
    animating = true; accum = 0;
    slidePanel(panelBW, '0%', function() {
      state = 'bw'; animating = false;
      fireBW();
    });
  }
  function goToContent() {
    animating = true; accum = 0;
    slidePanel(panelContent, '0%', function() {
      state = 'content'; animating = false;
      fireWork();
    });
  }
  function goToHero() {
    animating = true; accum = 0;
    resetBW();
    slidePanel(panelBW, '100%', function() {
      state = 'hero'; animating = false;
    });
  }
  function goToBWFromContent() {
    animating = true; accum = 0;
    resetWork();
    slidePanel(panelContent, '100%', function() {
      state = 'bw'; animating = false;
    });
  }
  function handleDelta(dy) {
    if (animating) return;

    var now = Date.now();
    // Reset accumulator if the user paused (stale intent)
    if (now - lastWheel > 500) accum = 0;
    lastWheel = now;

    // Content panel: scroll internally, only intercept at edge
    if (state === 'content') {
      if (dy > 0) {
        panelContent.scrollTop += dy;
        accum = 0;
        return;
      }
      if (panelContent.scrollTop > 0) {
        panelContent.scrollTop += dy;
        accum = 0;
        return;
      }
      // At the top of content, scrolling up — accumulate
      accum += dy;
      if (accum < -THRESHOLD) goToBWFromContent();
      return;
    }

    accum += dy;

    if (state === 'hero'  && accum >  THRESHOLD) goToBW();
    if (state === 'bw'    && accum >  THRESHOLD) goToContent();
    if (state === 'bw'    && accum < -THRESHOLD) goToHero();
  }

  // ── Event listeners ──
  window.addEventListener('wheel', function(e) {
    e.preventDefault();
    var dy = e.deltaMode === 1 ? e.deltaY * 20 : e.deltaY; // normalize lines→px
    handleDelta(dy);
  }, { passive: false });

  window.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault(); handleDelta(THRESHOLD + 10);
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault(); handleDelta(-(THRESHOLD + 10));
    }
  });

  var touchStartY = 0;
  window.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', function(e) {
    var dy = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 40) handleDelta(dy * 3.5);
  }, { passive: true });

})();
</script>

</body>
</html>
