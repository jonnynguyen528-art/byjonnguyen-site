<!-- model-viewer library -->
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- ✅ Step 3 goes RIGHT HERE -->
<script>
(() => {
  const mv = document.getElementById('heroModel');
  const status = document.getElementById('mvStatus');
  if (!mv || !status) return;

  const set = (t) => status.textContent = t;

  set('Loading model…');

  mv.addEventListener('load', () => set('Model loaded ✅'));
  mv.addEventListener('error', (e) => {
    console.error('model-viewer error:', e);
    set('Model failed ❌ (open Console)');
  });

  if (!customElements.get('model-viewer')) {
    set('model-viewer script not loaded ❌');
  }
})();
</script>
