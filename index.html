<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
  <style>
    #sculptureCanvas {
      display: block;
      width: 100%;
      height: auto;
    }
    /* Loading state — fades out once GLB is ready */
    #sculptureWrap {
      position: relative;
    }
    #sculptureLoader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    #sculptureLoader.hidden { opacity: 0; }
    #sculptureLoader span {
      width: 28px; height: 28px;
      border: 2px solid rgba(0,0,0,0.12);
      border-top-color: rgba(0,0,0,0.45);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-title reveal reveal-delay-1">
        <span class="hero-word left">CREATIVE</span>
        <span class="hero-word right">DIRECTOR</span>
      </div>

      <div class="hero-bust">
        <div class="hero-sculpture" id="heroStage">
          <div id="sculptureWrap">
            <canvas id="sculptureCanvas"></canvas>
            <div id="sculptureLoader"><span></span></div>
          </div>
          <span class="shadow" aria-hidden="true"></span>
        </div>
      </div>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work"    style="height:50vh;"></section>
  <section id="about"   style="height:50vh;"></section>
  <section id="contact" style="height:50vh;"></section>
</main>

<script>
window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  });
});
</script>

<!-- Three.js importmap — must come before any type="module" script -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE       from 'three';
import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ── Config ────────────────────────────────────────────────────────────────────
const CFG = {
  glbPath:    'assets/porcelain_girl_2_opt.glb',
  fov:        28,       // telephoto — no facial distortion
  frameFill:  0.86,     // how much vertical FOV the bust fills
  exposure:   0.80,     // ACESFilmic exposure — ≤1 to avoid blowing out whites
  ambientColor: 0xfff8f2, ambientIntensity: 0.72,
  keyColor:     0xffffff, keyIntensity:     0.68,
  fillColor:    0xe8f0ff, fillIntensity:    0.20,
  rimColor:     0xffffff, rimIntensity:     0.14,
  maxRotY: 0.30,
  maxRotX: 0.18,
  ease:    0.07,
};

const stage  = document.getElementById('heroStage');
const canvas = document.getElementById('sculptureCanvas');
const loader_el = document.getElementById('sculptureLoader');

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({
  canvas,
  alpha: true,
  antialias: true,
  premultipliedAlpha: false,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace    = THREE.SRGBColorSpace;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = CFG.exposure;
renderer.setClearColor(0x000000, 0);

// ── CRITICAL: setSize with updateStyle=false ──────────────────────────────────
// Passing false means Three.js sets canvas.width/height (resolution) but does
// NOT inject canvas.style.width/height inline — so our CSS width:100% stays.
function syncSize() {
  // Use the parent's width; derive height from the 820:1060 aspect ratio.
  const w = canvas.parentElement?.clientWidth || 820;
  const h = Math.round(w * (1060 / 820));
  renderer.setSize(w, h, false);   // <-- false is the key fix
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

// ── Scene & Camera ────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(CFG.fov, 820 / 1060, 0.01, 200);

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(CFG.ambientColor, CFG.ambientIntensity));

const keyLight = new THREE.DirectionalLight(CFG.keyColor, CFG.keyIntensity);
keyLight.position.set(-1.6, 2.8, 3.2);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(CFG.fillColor, CFG.fillIntensity);
fillLight.position.set(3.0, 0.8, 2.0);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(CFG.rimColor, CFG.rimIntensity);
rimLight.position.set(0, 6, 0.5);
scene.add(rimLight);

// ── Load GLB (with optional Draco) ───────────────────────────────────────────
const draco = new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(draco);

let modelGroup = null;

gltfLoader.load(
  CFG.glbPath,

  // ── onLoad ────────────────────────────────────────────────────────────────
  (gltf) => {
    const model = gltf.scene;

    // Centre pivot on bounding box
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    model.position.sub(center);

    modelGroup = new THREE.Group();
    modelGroup.add(model);
    scene.add(modelGroup);

    // Frame camera: bust fills frameFill of vertical FOV, look at face area
    const fovRad   = camera.fov * Math.PI / 180;
    const distance = (size.y * CFG.frameFill) / (2 * Math.tan(fovRad / 2));
    const eyeY     = size.y * 0.05;
    camera.position.set(0, eyeY, distance);
    camera.lookAt(0, eyeY, 0);
    camera.updateProjectionMatrix();

    // Re-sync canvas size now we know the aspect
    syncSize();

    // Hide loading spinner
    if (loader_el) loader_el.classList.add('hidden');
    setTimeout(() => { if (loader_el) loader_el.remove(); }, 700);
  },

  // ── onProgress ────────────────────────────────────────────────────────────
  undefined,

  // ── onError ───────────────────────────────────────────────────────────────
  (err) => {
    console.error('[sculpture] GLB failed to load:', err);
    console.error('[sculpture] Tried path:', CFG.glbPath);
    if (loader_el) loader_el.innerHTML =
      '<small style="color:#c00;font-size:11px">GLB not found — check /assets/ path</small>';
  }
);

// ── Pointer rotation ──────────────────────────────────────────────────────────
let targetRX = 0, targetRY = 0, currentRX = 0, currentRY = 0;

stage.addEventListener('pointermove', (e) => {
  const r  = stage.getBoundingClientRect();
  const nx = ((e.clientX - r.left) / r.width  - 0.5) * 2;
  const ny = ((e.clientY - r.top)  / r.height - 0.5) * 2;
  targetRY =  nx * CFG.maxRotY;
  targetRX = -ny * CFG.maxRotX;
}, { passive: true });

const resetRot = () => { targetRX = 0; targetRY = 0; };
stage.addEventListener('pointerleave', resetRot);
window.addEventListener('blur', resetRot);

// ── Render loop ───────────────────────────────────────────────────────────────
function tick() {
  requestAnimationFrame(tick);
  currentRX += (targetRX - currentRX) * CFG.ease;
  currentRY += (targetRY - currentRY) * CFG.ease;
  if (modelGroup) {
    modelGroup.rotation.x = currentRX;
    modelGroup.rotation.y = currentRY;
  }
  renderer.render(scene, camera);
}

// Initial size sync then start loop
syncSize();
tick();

window.addEventListener('resize', syncSize);

</script>

</body>
</html>
