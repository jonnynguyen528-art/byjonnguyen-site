<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <!-- Montserrat from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <style>

    /* ── Cinema Sunday — place the .otf at assets/fonts/cinema-sunday.otf ── */
    @font-face {
      font-family: 'Cinema Sunday';
      src: url('assets/fonts/cinema-sunday.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ── Base typography ─────────────────────────────────────────────────── */
    /* Reference: Jazz poster — big serif dominates, sans-serif supports */

    body {
      font-family: 'Montserrat', sans-serif;
    }

    /* Nav brand — Cinema Sunday, large editorial treatment */
    .brand {
      font-family: 'Cinema Sunday', serif;
      font-weight: normal;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 2.2rem;
      line-height: 1;
    }

    .nav a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    /* 3-col composition: CREATIVE | bust | DIRECTOR */
    .hero-composition {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      overflow: visible;
    }

    /* Each word column takes equal flex space, bust is fixed */
    .hero-word-col {
      flex: 1;
      display: flex;
      align-items: flex-end; /* align word to bottom of its column */
      /* push word down to ~52% of bust height (neck) */
      padding-top: calc(min(560px, 82vw) * 0.46);
      position: relative;
      z-index: 1; /* bust (z-index:3) renders on top for overlap effect */
    }

    /* Negative margin pulls words INTO the bust — bust z-index:3 sits on top */
    .hero-word-col.left  { justify-content: flex-end;  margin-right: -200px; }
    .hero-word-col.right { justify-content: flex-start; margin-left:  -200px; }

    /* Hero headline — Cinema Sunday */
    .hero-word {
      font-family: 'Cinema Sunday', serif;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1;
      font-size: clamp(32px, 3.8vw, 62px);
      color: rgba(18,18,18,0.88);
      white-space: nowrap;
    }

    /* "BUILDING WORLDS" — Montserrat medium, very wide tracking */
    .hero-line1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(18,18,18,0.70);
    }

    /* "BRAND · DIGITAL · EXPERIENTIAL" — Montserrat light, open tracking */
    .hero-line2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      font-size: 9.5px;
      color: rgba(18,18,18,0.48);
      margin-top: 6px;
    }
    /* ── Turntable ───────────────────────────────────────────────────────── */
    .turntable-wrap {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    /* Two stacked images — we crossfade between them */
    .turntable-img {
      display: block;
      width: 100%;
      height: auto;
      /* Radial mask fades out black corners so the bust
         floats on the off-white background without re-exporting */
      -webkit-mask-image: radial-gradient(
        ellipse 78% 88% at 50% 48%,
        black 55%, transparent 100%
      );
      mask-image: radial-gradient(
        ellipse 78% 88% at 50% 48%,
        black 55%, transparent 100%
      );
      user-select: none;
      pointer-events: none;
    }

    /* Back frame sits underneath, never animated */
    .turntable-img.back {
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    /* Crossfade: front fades out → back fades in */
    .turntable-wrap.fading .turntable-img.front { opacity: 0; }
    .turntable-wrap.fading .turntable-img.back   { opacity: 1; }

    .turntable-img.front,
    .turntable-img.back {
      transition: opacity 0.06s linear;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    .hero-sculpture {
      animation: floaty 6s ease-in-out infinite;
    }

    /* ── Full-page cursor spotlight overlay ─────────────────────────────── */
    /* Spotlight: dark vignette with a transparent hole at cursor = real spotlight feel */
    #cursorSpotlight {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #cursorSpotlight.active { opacity: 1; }

    /* Ground shadow — sits just below the sculpture base */
    #groundShadow {
      position: absolute;
      bottom: 3%;
      left: 50%;
      width: 52%;
      height: 28px;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0.32) 0%,
        rgba(0,0,0,0.12) 45%,
        transparent 70%);
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity, filter;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <!-- 3-col row: word | bust | word -->
      <div class="hero-composition reveal reveal-delay-1">
        <div class="hero-word-col left">
          <span class="hero-word">CREATIVE</span>
        </div>

        <div class="hero-bust">
          <div class="hero-sculpture" id="heroStage" style="position:relative;">
            <div class="turntable-wrap" id="turntableWrap">
              <!-- Front frame (visible) -->
              <img class="turntable-img front" id="ttFront"
                   src="frames/hero-bust-b2.png" alt="Porcelain bust sculpture" draggable="false" />
              <!-- Back frame (fades in during swap) -->
              <img class="turntable-img back"  id="ttBack"
                   src="frames/hero-bust-b2.png" alt="" draggable="false" />
            </div>
            <div id="groundShadow"></div>
          </div>
        </div>

        <div class="hero-word-col right">
          <span class="hero-word">DIRECTOR</span>
        </div>
      </div>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND &nbsp;·&nbsp; DIGITAL &nbsp;·&nbsp; EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work"    style="height:50vh;"></section>
  <section id="about"   style="height:50vh;"></section>
  <section id="contact" style="height:50vh;"></section>
</main>

<!-- Full-page cursor spotlight -->
<div id="cursorSpotlight"></div>

<script>
window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  });
});
</script>

<script>
(function () {
  const spotlight = document.getElementById('cursorSpotlight');
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let curX = mouseX, curY = mouseY;
  let hasEntered = false;
  const LERP = 0.08; // matches WebGL EASE exactly

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    hasEntered = true;
  });

  function tick() {
    curX += (mouseX - curX) * LERP;
    curY += (mouseY - curY) * LERP;

        if (!hasEntered) {
      requestAnimationFrame(tick);
      return;
    }

    // Spotlight strength: how far cursor is from screen center (0=center, 1=edge)
    const W = window.innerWidth, H = window.innerHeight;
    const dx = (curX - W * 0.5) / (W * 0.5);
    const dy = (curY - H * 0.5) / (H * 0.5);
    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 1.0);
    const blendRatio = dist * 0.8;

    if (blendRatio < 0.02) {
      spotlight.style.opacity = '0';
      requestAnimationFrame(tick);
      return;
    }

    spotlight.style.opacity = blendRatio.toFixed(3);
    spotlight.style.background = `
      radial-gradient(
        320px circle at ${curX}px ${curY}px,
        rgba(255, 242, 210, 0.10) 0%,
        rgba(255, 238, 195, 0.04) 50%,
        transparent 100%
      ),
      radial-gradient(
        800px circle at ${curX}px ${curY}px,
        transparent 0%,
        transparent 25%,
        rgba(12, 10, 6, 0.05) 60%,
        rgba(12, 10, 6, 0.13) 100%
      )
    `;

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>


<script>
(function () {

  // ── Config ────────────────────────────────────────────────────────────────
  const H_FRAMES  = 3;           // columns: a=left(-15°)  b=center(0°)  c=right(+15°)
  const V_FRAMES  = 3;           // rows:    1=up(+15°)    2=center(0°)  3=down(-15°)
  const FRAME_DIR = 'frames/';   // folder containing hero-bust-[a/b/c][1/2/3].png
  const H_COLS    = ['a', 'b', 'c'];
  const LERP      = 0.08;        // easing speed (lower = more cinematic)

  // ── Elements ──────────────────────────────────────────────────────────────
  const wrap     = document.getElementById('turntableWrap');
  const front    = document.getElementById('ttFront');
  const back     = document.getElementById('ttBack');
  const shadowEl = document.getElementById('groundShadow');
  if (!wrap || !front || !back) return;

  // ── Preload all 9 frames into a 2D array: frames[h][v] ───────────────────
  // b2 (h=1, v=1) is already in the DOM — preload the other 8 silently.
  // Turntable stays on b2 until all frames are ready.
  let framesReady = false;
  const frames = [];
  let loadedCount = 0;
  const TOTAL = H_FRAMES * V_FRAMES;

  for (let h = 0; h < H_FRAMES; h++) {
    frames[h] = [];
    for (let v = 0; v < V_FRAMES; v++) {
      const img = new Image();
      const src = `${FRAME_DIR}hero-bust-${H_COLS[h]}${v + 1}.png`;
      img.onload = img.onerror = () => {
        loadedCount++;
        if (loadedCount >= TOTAL) framesReady = true;
      };
      // b2 is already displayed — count it as loaded immediately
      if (h === 1 && v === 1) { img.src = front.src; loadedCount++; }
      else img.src = src;
      frames[h][v] = img;
    }
  }
  if (loadedCount >= TOTAL) framesReady = true;

  // ── State ─────────────────────────────────────────────────────────────────
  // Float indices lerp toward target, then snap to nearest integer for frame lookup
  let curH = 1, curV = 1;        // float, start at center frame b2 (h1, v1)
  let tgtH = 1, tgtV = 1;
  let shownH = 1, shownV = 1;    // which frame is currently displayed
  let mouseX = window.innerWidth  / 2;
  let mouseY = window.innerHeight / 2;
  let hasEntered = false;

  // ── Idle: return to b2 after 3s without movement ──────────────────────────
  let idleTimer = null;
  function resetToIdle() {
    tgtH = 1; tgtV = 1;  // b2 = center, the resting position
  }
  function scheduleIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(resetToIdle, 3000);
  }

  // ── Cursor tracking ───────────────────────────────────────────────────────
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    hasEntered = true;

    // X: full viewport width → h0 (left) … h2 (right)
    tgtH = (e.clientX / window.innerWidth)  * (H_FRAMES - 1);

    // Y: full viewport height → v0 (up) … v2 (down)
    tgtV = (e.clientY / window.innerHeight) * (V_FRAMES - 1);

    scheduleIdle();
  });

  // Mouse leaves window — snap back to b2 immediately
  document.addEventListener('mouseleave', () => {
    clearTimeout(idleTimer);
    resetToIdle();
  });

  // ── Ground shadow — shifts opposite cursor X ──────────────────────────────
  function updateShadow() {
    if (!shadowEl || !hasEntered) return;
    const cx     = mouseX / window.innerWidth - 0.5;  // -0.5 → 0.5
    const dist   = Math.abs(cx);
    const offsetX = -cx * 120;
    const scaleX  = 0.8 + dist * 2.0;
    const blur    = 8   + dist * 20;
    const opacity = 0.08 + dist * 0.25;
    shadowEl.style.transform = `translateX(calc(-50% + ${offsetX.toFixed(1)}px)) scaleX(${scaleX.toFixed(3)})`;
    shadowEl.style.filter    = `blur(${blur.toFixed(1)}px)`;
    shadowEl.style.opacity   = Math.min(opacity, 0.4).toFixed(3);
  }

  // ── Frame swap with crossfade ─────────────────────────────────────────────
  let isFading = false;

  function swapToFrame(h, v) {
    if (!framesReady) return;       // hold on b2 until all frames are loaded
    if (h === shownH && v === shownV) return;
    const img = frames[h][v];
    if (!img || !img.complete) return;

    back.src = img.src;

    if (!isFading) {
      isFading = true;
      wrap.classList.add('fading');
      setTimeout(() => {
        front.src = back.src;
        wrap.classList.remove('fading');
        isFading = false;
        shownH = h;
        shownV = v;
      }, 65);
    } else {
      shownH = h;
      shownV = v;
    }
  }

  // ── Animation loop ────────────────────────────────────────────────────────
  function tick() {
    curH += (tgtH - curH) * LERP;
    curV += (tgtV - curV) * LERP;

    const h = Math.max(0, Math.min(H_FRAMES - 1, Math.round(curH)));
    const v = Math.max(0, Math.min(V_FRAMES - 1, Math.round(curV)));

    swapToFrame(h, v);
    updateShadow();
    requestAnimationFrame(tick);
  }

  tick();

})();
</script>

</body>
</html>
