<!-- index.html — LAST KNOWN WORKING (before angle edits) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-title reveal reveal-delay-1">
        <span class="hero-word left">CREATIVE</span>
        <span class="hero-word right">DIRECTOR</span>
      </div>

      <div class="hero-bust reveal reveal-delay-2">
        <model-viewer
          id="heroModel"
          src="/assets/porcelain_girl_2.glb"
          alt="Porcelain sculpture"
          interaction-prompt="none"
          camera-controls
          disable-pan
          disable-zoom
          environment-image="neutral"
          exposure="1.05"
          camera-orbit="0deg 75deg auto"
          min-camera-orbit="0deg 75deg auto"
          max-camera-orbit="0deg 75deg auto"
          camera-target="0m 0m 0m"
          style="width:100%; height:100%; background:transparent;"
        ></model-viewer>
      </div>

      <div id="mvStatus" style="position:absolute; left:0; right:0; bottom:-26px; text-align:center; font:12px system-ui; color:rgba(18,18,18,.55);">
  checking…
</div>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work" style="height: 50vh;"></section>
  <section id="about" style="height: 50vh;"></section>
  <section id="contact" style="height: 50vh;"></section>
</main>

<!-- model-viewer library (use one CDN + legacy fallback) -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>

<!-- Reveal -->
<script>
  window.addEventListener('load', () => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
    });
  });
</script>

<!-- Cursor tracking (FULL BROWSER) -->
<script>
(() => {
  const mv = document.getElementById('heroModel');
  if (!mv) return;

  // Make sure nothing auto-moves the camera
  mv.removeAttribute('auto-rotate');
  mv.autoRotate = false;
  mv.removeAttribute('camera-controls');
  mv.cameraControls = false;

  const MAX_YAW = 6;
  const MAX_PITCH = 4;
  const BASE_PITCH = 75;
  const EASE = 0.08;

  let radius = 2.4; // will be replaced with the real framed radius
  let yaw = 0, pitch = BASE_PITCH;
  let targetYaw = 0, targetPitch = BASE_PITCH;

  function setTarget(e) {
    const nx = (e.clientX / window.innerWidth - 0.5) * 2;
    const ny = (e.clientY / window.innerHeight - 0.5) * 2;

    // cursor left => model turns left
    targetYaw = -nx * MAX_YAW;
    targetPitch = BASE_PITCH + (-ny * MAX_PITCH);
  }

  function animate() {
    yaw += (targetYaw - yaw) * EASE;
    pitch += (targetPitch - pitch) * EASE;

    mv.cameraOrbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${radius.toFixed(3)}m`;
    requestAnimationFrame(animate);
  }

  mv.addEventListener('load', () => {
    // Get the actual radius model-viewer used to frame the model
    try {
      const o = mv.getCameraOrbit();
      if (o && isFinite(o.radius) && o.radius > 0) radius = o.radius;
    } catch (_) {}

    // start centered
    yaw = 0; pitch = BASE_PITCH;
    targetYaw = 0; targetPitch = BASE_PITCH;

    requestAnimationFrame(animate);
  }, { once: true });

  window.addEventListener('pointermove', setTarget, { passive: true });

  document.addEventListener('mouseleave', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });

  window.addEventListener('blur', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });
})();
</script>

</body>
</html>
