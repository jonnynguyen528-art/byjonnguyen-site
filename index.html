<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jon Nguyen — Creative Director</title>
<meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential.">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="site-header">
<div class="nav-wrap">
<a class="brand" href="#">JON NGUYEN</a>

<nav class="nav">
<a href="#work">WORK</a>
<a href="#about">ABOUT</a>
<a href="#contact">CONTACT</a>
</nav>

</div>
</header>


<main>

<section class="hero-center">

<div class="hero-inner">


<div class="hero-title reveal reveal-delay-1">

<span class="hero-word left">CREATIVE</span>
<span class="hero-word right">DIRECTOR</span>

</div>


<div class="hero-bust">

<div class="hero-sculpture">

<img
id="heroImage"
src="/assets/porcelain.png"
alt="Porcelain sculpture"
/>

</div>

</div>



<div class="hero-sub reveal reveal-delay-3">

<div class="hero-line1">
BUILDING WORLDS
</div>

<div class="hero-line2">
BRAND DIGITAL EXPERIENTIAL
</div>

</div>


</div>

</section>


<section id="work" style="height:50vh;"></section>
<section id="about" style="height:50vh;"></section>
<section id="contact" style="height:50vh;"></section>


</main>



<script>

window.addEventListener('load', () => {

requestAnimationFrame(() => {

document
.querySelectorAll('.reveal')
.forEach(el => el.classList.add('in'))

})

})

</script>



<script>

const img = document.getElementById("heroImage")

let targetX = 0
let targetY = 0

let currentX = 0
let currentY = 0

const ease = .08

window.addEventListener("pointermove", e => {

const x = e.clientX / window.innerWidth
const y = e.clientY / window.innerHeight

targetX = (y - .5) * -12
targetY = (x - .5) * 14


document.documentElement.style.setProperty(
"--lightX",
e.clientX + "px"
)

document.documentElement.style.setProperty(
"--lightY",
e.clientY + "px"
)

})


function animate(){

currentX += (targetX - currentX) * ease
currentY += (targetY - currentY) * ease

img.style.transform =
`rotateX(${currentX}deg) rotateY(${currentY}deg) translateY(-8px)`

requestAnimationFrame(animate)

}

animate()

</script>


</body>
</html>
