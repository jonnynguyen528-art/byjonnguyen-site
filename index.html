<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-title reveal reveal-delay-1">
        <span class="hero-word left">CREATIVE</span>
        <span class="hero-word right">DIRECTOR</span>
      </div>

<div class="hero-bust">
  <model-viewer
    id="heroModel"
    src="/assets/porcelain_girl_2.glb"
    alt="Porcelain sculpture"
    loading="eager"
    reveal="auto"
environment-image="/assets/hdr/soft_studio_1k.hdr"
tone-mapping="aces"
exposure="1.15"
shadow-softness="1"
    tone-mapping="aces"
    interaction-prompt="none"
    camera-orbit="0deg 75deg 2.4m"
    style="width:100%;height:100%;background:transparent;">
  </model-viewer>

      <div class="hero-sub reveal reveal-delay-3">
        <div class="hero-line1">BUILDING WORLDS</div>
        <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
      </div>

    </div>
  </section>

  <section id="work" style="height: 50vh;"></section>
  <section id="about" style="height: 50vh;"></section>
  <section id="contact" style="height: 50vh;"></section>
</main>

<!-- model viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- reveal animation -->
<script>
window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  });
});
</script>

<!-- cursor tracking luxury rotation -->
<script>
(() => {
  const model = document.getElementById('heroModel');
  if (!model) return;

  const MAX_YAW = 6;
  const MAX_PITCH = 4;
  const BASE_PITCH = 75;
  const RADIUS = '2.4m';

  const ease = 0.08;

  let targetYaw = 0, targetPitch = BASE_PITCH;
  let yaw = 0, pitch = BASE_PITCH;

  function setTargetFromWindow(e) {
    const x = e.clientX / window.innerWidth;
    const y = e.clientY / window.innerHeight;

    const nx = (x - 0.5) * 2;
    const ny = (y - 0.5) * 2;

    targetYaw = -nx * MAX_YAW;
    targetPitch = BASE_PITCH + (-ny * MAX_PITCH);
  }

  function animate() {
    yaw += (targetYaw - yaw) * ease;
    pitch += (targetPitch - pitch) * ease;

    model.cameraOrbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${RADIUS}`;
    requestAnimationFrame(animate);
  }

  model.addEventListener('load', () => {
    model.cameraOrbit = `0deg ${BASE_PITCH}deg ${RADIUS}`;
    requestAnimationFrame(animate);
  });

  window.addEventListener('pointermove', setTargetFromWindow, { passive: true });

  document.addEventListener('mouseleave', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });

  window.addEventListener('blur', () => {
    targetYaw = 0;
    targetPitch = BASE_PITCH;
  });
})();
</script>

<!-- porcelain material polish -->
<script>
const mv = document.getElementById('heroModel');

if (mv) {
  mv.addEventListener('load', () => {
    const mats = mv.model?.materials;
    if (!mats?.length) return;

    mats.forEach(mat => {
      const pbr = mat.pbrMetallicRoughness;

      // Core porcelain (kills "plastic CG" shine)
      pbr.setMetallicFactor(0.0);
      pbr.setRoughnessFactor(0.62); // <- broader, softer highlights
      pbr.setBaseColorFactor([1.0, 0.985, 0.97, 1.0]); // warm porcelain

      // If supported by the model/extensions, add subtle glaze + softness
      if (mat.ior?.setIor) mat.ior.setIor(1.45);

      if (mat.specular?.setSpecularFactor) mat.specular.setSpecularFactor(0.25);
      if (mat.specular?.setSpecularColorFactor) mat.specular.setSpecularColorFactor([1, 1, 1]);

      if (mat.clearcoat?.setClearcoatFactor) mat.clearcoat.setClearcoatFactor(0.12);
      if (mat.clearcoat?.setClearcoatRoughnessFactor) mat.clearcoat.setClearcoatRoughnessFactor(0.35);

      if (mat.sheen?.setSheenColorFactor) mat.sheen.setSheenColorFactor([1.0, 0.98, 0.96]);
      if (mat.sheen?.setSheenRoughnessFactor) mat.sheen.setSheenRoughnessFactor(0.85);
    });
  });
}
</script>

<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
<script nomodule src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-legacy.js"></script>

<script>
  const mv = document.getElementById('heroModel');
  const status = document.getElementById('mvStatus');

  if (!customElements.get('model-viewer')) {
    status.textContent = '❌ model-viewer library did NOT load (script blocked/failing).';
  } else {
    status.textContent = '✅ model-viewer loaded. Waiting for model…';
  }

  mv?.addEventListener('load', () => status.textContent = '✅ GLB loaded and rendered.');
  mv?.addEventListener('error', () => status.textContent = '❌ GLB error (corrupt/unsupported).');
</script>
  
</body>
</html>
