<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="#">JON NGUYEN</a>
      <nav class="nav">
        <a href="#work">WORK</a>
        <a href="#about">ABOUT</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-center">
      <div class="hero-inner">

        <div class="hero-title reveal reveal-delay-1">
          <span class="hero-word left">CREATIVE</span>
          <span class="hero-word right">DIRECTOR</span>
        </div>

        <div class="hero-bust reveal reveal-delay-2">
          <model-viewer
            id="heroModel"
            src="/assets/porcelain_girl_2.glb"
            alt="Porcelain sculpture"
            interaction-prompt="none"
            disable-pan
            disable-zoom
            environment-image="neutral"
            exposure="1.05"
            camera-target="0m 0.05m 0m"
            camera-orbit="0deg 75deg 0.1m"
            min-camera-orbit="0deg 75deg 0.1m"
            max-camera-orbit="0deg 75deg 0.1m"
            style="width:100%; height:100%; background:transparent;"
          ></model-viewer>
        </div>

        <div class="hero-sub reveal reveal-delay-3">
          <div class="hero-line1">BUILDING WORLDS</div>
          <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
        </div>

      </div>
    </section>
  </main>

  <!-- Reveal -->
  <script>
    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
      });
    });
  </script>

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>

  <!-- Cursor tracking -->
 <script>
(async () => {
  await customElements.whenDefined('model-viewer');

  const mv = document.getElementById('heroModel');
  if (!mv) return;

  const MAX_YAW = 4;
  const MAX_PITCH = 3;
  const BASE_YAW = 0;
  const BASE_PITCH = 75;
  const EASE = 0.08;

  // IMPORTANT: this controls “zoom” (smaller = bigger model)
  const radiusM = 0.1;

  let yaw = BASE_YAW, pitch = BASE_PITCH;
  let targetYaw = BASE_YAW, targetPitch = BASE_PITCH;

  function setTarget(e) {
    const nx = (e.clientX / window.innerWidth - 0.5) * 2; // -1..1
    const ny = (e.clientY / window.innerHeight - 0.5) * 2; // -1..1

    targetYaw = BASE_YAW + (-nx * MAX_YAW);
    targetPitch = BASE_PITCH + (-ny * MAX_PITCH);
  }

  function tick() {
    yaw += (targetYaw - yaw) * EASE;
    pitch += (targetPitch - pitch) * EASE;

    mv.cameraOrbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${radiusM.toFixed(3)}m`;
    requestAnimationFrame(tick);
  }

  function reset() {
    targetYaw = BASE_YAW;
    targetPitch = BASE_PITCH;
  }

  function start() {
    // force initial orbit immediately on load
    mv.cameraOrbit = `${BASE_YAW.toFixed(2)}deg ${BASE_PITCH.toFixed(2)}deg ${radiusM.toFixed(3)}m`;
    requestAnimationFrame(tick);
  }

  if (mv.loaded) start();
  else mv.addEventListener('load', start, { once: true });

  window.addEventListener('pointermove', setTarget, { passive: true });

  // Reset when cursor truly leaves the browser window
  window.addEventListener('mouseout', (e) => {
    if (!e.relatedTarget) reset();
  });

  // Reset when tab/app loses focus
  window.addEventListener('blur', reset);
})();
</script>

</body>
</html>
