<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="preload" href="assets/fonts/cinema-sunday.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" as="image" href="frames/hero-bust-b2.png">
  <link rel="stylesheet" href="./style.css" />
  <style>

@font-face {
  font-family: 'Cinema Sunday';
  src: url('assets/fonts/cinema-sunday.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

/* ─── SCROLL SNAP ────────────────────────────────────────────────── */

html {
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

body { font-family: 'Montserrat', sans-serif; }

/* ─── NAV ────────────────────────────────────────────────────────── */

.brand {
  font-family: 'Cinema Sunday', serif;
  font-weight: normal;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-size: 2.2rem;
  line-height: 1;
}

.nav a {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-size: 0.75rem;
}

/* ─── HERO ───────────────────────────────────────────────────────── */

.hero-center {
  height: 100vh;
  scroll-snap-align: start;
  overflow: hidden;
  position: relative;
  align-items: flex-start;
}

.hero-composition {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  overflow: visible;
}

.hero-word-col {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding-top: calc(clamp(320px, 58vw, 680px) * 0.27);
  position: relative;
  z-index: 1;
}

.word-mask { overflow: hidden; display: inline-block; }

.hero-word-col.left  { justify-content: flex-end;  margin-right: clamp(-150px, -21vw, -260px); }
.hero-word-col.right { justify-content: flex-start; margin-left:  clamp(-150px, -21vw, -260px); }

.hero-word {
  font-family: 'Cinema Sunday', serif;
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1;
  font-size: clamp(32px, 5vw, 82px);
  color: rgba(18,18,18,0.88);
  white-space: nowrap;
}

@media (max-width: 900px) {
  .hero-word-col { padding-top: calc(clamp(240px, 48vw, 480px) * 0.22); }
  .hero-word-col.left  { margin-right: clamp(-60px, -12vw, -140px); }
  .hero-word-col.right { margin-left:  clamp(-60px, -12vw, -140px); }
  .hero-word { font-size: clamp(22px, 4.2vw, 52px); }
}

@media (max-width: 600px) {
  .hero-composition { flex-direction: row; align-items: flex-start; overflow: visible; }
  .hero-word-col { flex: 1; padding-top: calc(62vw * 0.27) !important; }
  .hero-word-col.left  { justify-content: flex-end;  margin-right: clamp(-40px, -11vw, -60px) !important; }
  .hero-word-col.right { justify-content: flex-start; margin-left:  clamp(-40px, -11vw, -60px) !important; }
  .hero-word { font-size: clamp(16px, 6.5vw, 28px); text-align: unset; white-space: nowrap; }
}

.hero-bust-img {
  display: block;
  width: 100%;
  height: auto;
  user-select: none;
  pointer-events: none;
}

@keyframes floaty {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-14px); }
}

.hero-sculpture { animation: floaty 6s ease-in-out infinite; }

#cursorSpotlight {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.8s ease;
}

#groundShadow {
  position: absolute;
  bottom: 3%;
  left: 50%;
  width: 52%;
  height: 28px;
  background: radial-gradient(ellipse at center,
    rgba(0,0,0,0.32) 0%,
    rgba(0,0,0,0.12) 45%,
    transparent 70%);
  transform: translateX(-50%);
  opacity: 0;
  pointer-events: none;
  will-change: transform, opacity, filter;
}

/* ─── HERO REVEAL ANIMATIONS ─────────────────────────────────────── */

.rx { opacity: 0; }

.rx-creative {
  animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards;
}

.rx-director {
  animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.85s forwards;
}

.rx-bust { /* triggered by JS */ }

@keyframes revealWord {
  0%   { opacity: 0; transform: translateY(110%); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes revealBust {
  0%   { opacity: 0; transform: translateY(32px); }
  100% { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .rx-creative { animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards; }
  .rx-director { animation: revealWord 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards; }
  .rx-bust     { animation: revealBust 2.2s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards; }
}

/* ─── BUILDING WORLDS SECTION ────────────────────────────────────── */

.bw-section {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background-color: rgb(244, 241, 234);
}

.bw-word-wrap {
  overflow: hidden;
  display: block;
  line-height: 1.0;
}

.bw-word {
  display: block;
  font-family: 'Cinema Sunday', serif;
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: clamp(52px, 10vw, 156px);
  color: rgba(18,18,18,0.88);
  opacity: 0;
  transform: translateY(115%);
  transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1),
              transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform, opacity;
}

.bw-word.revealed {
  opacity: 1;
  transform: translateY(0);
}

.bw-rule {
  width: 0;
  height: 1px;
  background: rgba(18,18,18,0.18);
  margin: 40px auto;
  transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.bw-rule.revealed {
  width: clamp(100px, 20vw, 280px);
}

.bw-tagline {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  font-size: clamp(9px, 0.85vw, 11px);
  color: rgba(18,18,18,0.45);
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1),
              transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.bw-tagline.revealed {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 600px) {
  .bw-word { font-size: clamp(38px, 13vw, 76px); }
  .bw-rule { margin: 28px auto; }
}

/* ─── WORK / ABOUT / CONTACT SECTIONS ───────────────────────────── */

.content-section {
  height: 100vh;
  scroll-snap-align: start;
}

  </style>
</head>

<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="#">JON NGUYEN</a>
    <nav class="nav">
      <a href="#work">WORK</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main>

  <!-- ─── HERO ─────────────────────────────────────────────────── -->
  <section class="hero-center">
    <div class="hero-inner">

      <div class="hero-composition">

        <div class="hero-word-col left">
          <div class="word-mask"><span class="hero-word rx rx-creative">CREATIVE</span></div>
        </div>

        <div class="hero-bust rx rx-bust">
          <div class="hero-sculpture" id="heroStage" style="position:relative;">
            <img class="hero-bust-img"
                 src="frames/hero-bust-b2.png"
                 alt="Porcelain bust sculpture"
                 fetchpriority="high"
                 draggable="false" />
            <div id="groundShadow"></div>
          </div>
        </div>

        <div class="hero-word-col right">
          <div class="word-mask"><span class="hero-word rx rx-director">DIRECTOR</span></div>
        </div>

      </div>

    </div>
  </section>

  <!-- ─── BUILDING WORLDS ──────────────────────────────────────── -->
  <section class="bw-section">
    <div class="bw-word-wrap">
      <span class="bw-word" id="bwBuilding">BUILDING</span>
    </div>
    <div class="bw-word-wrap">
      <span class="bw-word" id="bwWorlds">WORLDS</span>
    </div>
    <div class="bw-rule" id="bwRule"></div>
    <div class="bw-tagline" id="bwTagline">BRAND &nbsp;&middot;&nbsp; DIGITAL &nbsp;&middot;&nbsp; EXPERIENTIAL</div>
  </section>

  <section id="work"    class="content-section"></section>
  <section id="about"   class="content-section"></section>
  <section id="contact" class="content-section"></section>

</main>

<div id="cursorSpotlight"></div>

<script>
// ── Cursor spotlight ──
(function () {
  const spotlight = document.getElementById('cursorSpotlight');
  const shadowEl  = document.getElementById('groundShadow');
  let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
  let curX = mouseX, curY = mouseY;
  let hasEntered = false;
  const LERP = 0.08;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY; hasEntered = true;
  });

  function tick() {
    curX += (mouseX - curX) * LERP;
    curY += (mouseY - curY) * LERP;

    if (!hasEntered) { requestAnimationFrame(tick); return; }

    const W = window.innerWidth, H = window.innerHeight;
    const dx = (curX - W * 0.5) / (W * 0.5);
    const dy = (curY - H * 0.5) / (H * 0.5);
    const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 1.0);
    const blend = dist * 0.8;

    if (blend < 0.02) {
      spotlight.style.opacity = '0';
    } else {
      spotlight.style.opacity = blend.toFixed(3);
      spotlight.style.background = `
        radial-gradient(320px circle at ${curX}px ${curY}px,
          rgba(255,242,210,0.10) 0%, rgba(255,238,195,0.04) 50%, transparent 100%),
        radial-gradient(800px circle at ${curX}px ${curY}px,
          transparent 0%, transparent 25%,
          rgba(12,10,6,0.05) 60%, rgba(12,10,6,0.13) 100%)`;
    }

    if (shadowEl) {
      const cx    = mouseX / W - 0.5;
      const adist = Math.abs(cx);
      shadowEl.style.transform = `translateX(calc(-50% + ${(-cx*120).toFixed(1)}px)) scaleX(${(0.8+adist*2).toFixed(3)})`;
      shadowEl.style.filter    = `blur(${(8+adist*20).toFixed(1)}px)`;
      shadowEl.style.opacity   = Math.min(0.08+adist*0.25, 0.4).toFixed(3);
    }

    requestAnimationFrame(tick);
  }
  tick();
})();

// ── Bust reveal ──
(function () {
  var PAGE_START = Date.now();
  var BUST_DELAY = 1700;
  var MAX_WAIT   = 2500;
  var bustEl  = document.querySelector('.rx-bust');
  var bustImg = document.querySelector('.hero-bust-img');
  var fired = false;
  function revealBust() {
    if (fired) return;
    fired = true;
    var elapsed = Date.now() - PAGE_START;
    var delay   = Math.max(0, BUST_DELAY - elapsed);
    bustEl.style.animation = 'revealBust 2.4s cubic-bezier(0.16,1,0.3,1) ' + delay + 'ms forwards';
  }
  var cap = setTimeout(revealBust, MAX_WAIT);
  if (bustImg.complete && bustImg.naturalWidth > 0) {
    clearTimeout(cap); revealBust();
  } else {
    bustImg.addEventListener('load',  function() { clearTimeout(cap); revealBust(); });
    bustImg.addEventListener('error', function() { clearTimeout(cap); revealBust(); });
  }
})();

// ── BUILDING WORLDS — IntersectionObserver reveal ──
(function () {
  var bwSection  = document.querySelector('.bw-section');
  var bwBuilding = document.getElementById('bwBuilding');
  var bwWorlds   = document.getElementById('bwWorlds');
  var bwRule     = document.getElementById('bwRule');
  var bwTagline  = document.getElementById('bwTagline');
  var triggered  = false;

  function fireReveal() {
    if (triggered) return;
    triggered = true;
    // Staggered: BUILDING → WORLDS → rule → tagline
    setTimeout(function() { bwBuilding.classList.add('revealed'); }, 80);
    setTimeout(function() { bwWorlds.classList.add('revealed');   }, 520);
    setTimeout(function() { bwRule.classList.add('revealed');     }, 980);
    setTimeout(function() { bwTagline.classList.add('revealed');  }, 1260);
  }

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        fireReveal();
        observer.unobserve(bwSection);
      }
    });
  }, { threshold: 0.6 });

  observer.observe(bwSection);
})();
</script>

</body>
</html>
