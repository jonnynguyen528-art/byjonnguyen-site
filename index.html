<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Nguyen — Creative Director</title>
  <meta name="description" content="Creative Director building brand worlds. Brand, digital, experiential." />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="#">JON NGUYEN</a>
      <nav class="nav">
        <a href="#work">WORK</a>
        <a href="#about">ABOUT</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-center">
      <div class="hero-inner">

        <div class="hero-title reveal reveal-delay-1">
          <span class="hero-word left">CREATIVE</span>
          <span class="hero-word right">DIRECTOR</span>
        </div>

        <div class="hero-bust reveal reveal-delay-2">
          <model-viewer
            id="heroModel"
            src="/assets/porcelain_girl_2.glb"
            alt="Porcelain sculpture"
            interaction-prompt="none"
            disable-pan
            disable-zoom
            environment-image="neutral"
            exposure="1.05"
            camera-target="0m 0m 0m"
            camera-orbit="0deg 75deg auto"
            style="width:100%; height:100%; background:transparent;"
          ></model-viewer>
        </div>

        <div class="hero-sub reveal reveal-delay-3">
          <div class="hero-line1">BUILDING WORLDS</div>
          <div class="hero-line2">BRAND DIGITAL EXPERIENTIAL</div>
        </div>

      </div>
    </section>

    <section id="work" style="height: 50vh;"></section>
    <section id="about" style="height: 50vh;"></section>
    <section id="contact" style="height: 50vh;"></section>
  </main>

  <!-- Reveal -->
  <script>
    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
      });
    });
  </script>

  <!-- model-viewer library -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>

  <!-- Cursor tracking (FULL BROWSER) — auto-frames, then locks real radius -->
 <!-- Cursor tracking (FULL BROWSER) — auto-frames, then locks real radius -->
<script>
(async () => {
  // Ensure <model-viewer> is registered before we touch it
  await customElements.whenDefined('model-viewer');

  const mv = document.getElementById('heroModel');
  if (!mv) return;

  // Safety: ensure no internal auto motion
  mv.removeAttribute('auto-rotate');
  mv.autoRotate = false;

  // Luxury range
  const MAX_YAW = 3.5;
  const MAX_PITCH = 2.5;

  // Your desired resting pose
  const BASE_YAW = -12;
  const BASE_PITCH = 70;

  const EASE = 0.08;

  // Will be locked after load
  let radiusM = 2.4;

  // State
  let yaw = BASE_YAW;
  let pitch = BASE_PITCH;
  let targetYaw = BASE_YAW;
  let targetPitch = BASE_PITCH;

  function resetToBase() {
    targetYaw = BASE_YAW;
    targetPitch = BASE_PITCH;
  }

  function setTarget(e) {
    const nx = (e.clientX / window.innerWidth - 0.5) * 2;  // -1..1
    const ny = (e.clientY / window.innerHeight - 0.5) * 2; // -1..1

    const yawDesired = BASE_YAW + (-nx * MAX_YAW);
    const pitchDesired = BASE_PITCH + (-ny * MAX_PITCH);

    // Clamp to base ± range (prevents wild swings)
    targetYaw = Math.max(BASE_YAW - MAX_YAW, Math.min(BASE_YAW + MAX_YAW, yawDesired));
    targetPitch = Math.max(BASE_PITCH - MAX_PITCH, Math.min(BASE_PITCH + MAX_PITCH, pitchDesired));
  }

  function tick() {
    yaw += (targetYaw - yaw) * EASE;
    pitch += (targetPitch - pitch) * EASE;

    mv.cameraOrbit = `${yaw.toFixed(2)}deg ${pitch.toFixed(2)}deg ${radiusM.toFixed(3)}m`;
    requestAnimationFrame(tick);
  }

  function start() {
    // Lock the radius model-viewer framed the model with
    try {
      const o = mv.getCameraOrbit?.();
      if (o && isFinite(o.radius) && o.radius > 0) radiusM = o.radius;
    } catch (_) {}

    // Start at base pose
    yaw = BASE_YAW;
    pitch = BASE_PITCH;
    resetToBase();

    requestAnimationFrame(tick);
  }

  // Start whether already loaded or not
  if (mv.loaded) start();
  else mv.addEventListener('load', start, { once: true });

  // Track cursor anywhere in the browser
  window.addEventListener('pointermove', setTarget, { passive: true });

  // Reliable reset when cursor leaves browser window
  window.addEventListener('mouseout', (e) => {
    if (!e.relatedTarget) resetToBase();
  });

  // Reset if tab/app loses focus
  window.addEventListener('blur', resetToBase);
})();
</script>
</body>
</html>
